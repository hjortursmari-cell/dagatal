<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Dagatal</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Dagatal" />
<meta name="theme-color" content="#f4e3e9" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Comfortaa:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@400;500;600;700&family=Pacifico&family=Caveat:wght@400;500;600;700&family=Chewy&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ---- page surround ---- */
  .page {
    min-height: 100vh;
    min-height: 100dvh;
    background:
      radial-gradient(1200px 480px at 50% -8%, var(--bg-glow) 0%, transparent 60%),
      var(--bg);
    position: relative;
    overflow-x: clip;
  }
  .florals { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .florals svg { position: absolute; }
  .florals .sprig-tr { top: -14px; right: -22px; width: 168px; height: auto; opacity: .55; }
  .florals .sprig-bl { bottom: -10px; left: -26px; width: 190px; height: auto; opacity: .5; transform: scaleX(-1); }
  .florals .sprig-mid { top: 44%; right: -54px; width: 120px; height: auto; opacity: .28; }

  .shell {
    position: relative;
    z-index: 1;
    max-width: 462px;
    margin: 0 auto;
    padding: 0 18px 72px;
  }

  /* ---- header ---- */
  .cal-head {
    position: sticky;
    top: 0;
    z-index: 30;
    margin: 0 -18px 18px;
    padding: calc(20px + env(safe-area-inset-top)) 18px 12px;
    background: var(--bg);
    border-bottom: 1px solid transparent;
    transition: box-shadow .2s ease, border-color .2s ease;
  }
  .cal-head::after {
    content: ""; position: absolute; left: 0; right: 0; top: 100%; height: 16px;
    background: linear-gradient(var(--bg), transparent);
    pointer-events: none;
  }
  .cal-head.stuck {
    box-shadow: 0 8px 22px var(--shadow);
    border-bottom-color: var(--line);
  }
  @media (max-width: 380px) {
    .cal-head { margin-left: -14px; margin-right: -14px; padding-left: 14px; padding-right: 14px; }
  }
  .kicker {
    font-family: var(--heading-font), 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: .32em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin: 0 0 10px 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .kicker::before, .kicker::after {
    content: ""; height: 1px; flex: 0 0 22px; background: var(--accent);
    opacity: .55;
  }
  .kicker span { white-space: nowrap; }
  .month-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .month-title {
    font-family: var(--heading-font), 'Comfortaa', sans-serif;
    font-weight: 600;
    font-size: 31px;
    line-height: 1.02;
    color: var(--ink);
    margin: 0;
    letter-spacing: -.01em;
  }
  .month-title .yr { color: var(--accent-deep); font-weight: 500; }
  .nav { display: flex; align-items: center; gap: 8px; }
  .nav-btn {
    appearance: none; border: none; cursor: pointer;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface);
    box-shadow: 0 2px 10px var(--shadow), inset 0 0 0 1px var(--line);
    color: var(--accent-deep);
    display: grid; place-items: center;
    transition: transform .16s ease, background .16s ease;
  }
  .nav-btn:hover { background: var(--holiday-bg); }
  .nav-btn:active { transform: scale(.9); }
  .nav-btn svg { width: 18px; height: 18px; }

  .subrow { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 8px; flex-wrap: wrap; }
  .week-label { font-size: 13.5px; color: var(--soft); font-weight: 600; }
  .today-btn {
    appearance: none; cursor: pointer;
    border: 1px solid var(--accent);
    background: var(--surface);
    color: var(--accent-deep);
    font-family: var(--heading-font), 'Quicksand', sans-serif; font-weight: 600; font-size: 13px;
    padding: 7px 16px; border-radius: 999px;
    transition: background .16s ease, transform .16s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .today-btn:hover { background: var(--holiday-bg); }
  .today-btn:active { transform: scale(.96); }
  .today-btn.is-current { opacity: .42; pointer-events: none; }

  /* ---- day cards ---- */
  .days { display: flex; flex-direction: column; gap: 13px; margin-top: 18px; }
  .day {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 15px 16px 14px;
    box-shadow: 0 6px 20px var(--shadow);
    transition: box-shadow .2s ease, transform .2s ease;
  }
  .day.weekend { background: var(--weekend); }
  .day.holiday { background: var(--holiday-bg); border-color: var(--accent); }
  .day.today {
    box-shadow: 0 8px 26px var(--shadow), inset 0 0 0 2px var(--accent-deep);
  }

  .day-top { display: flex; align-items: center; gap: 11px; }
  .date-badge {
    flex: 0 0 auto;
    width: 46px; height: 46px; border-radius: 14px;
    background: var(--badge); color: var(--accent-deep);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    line-height: 1;
  }
  .day.today .date-badge { background: var(--accent-deep); color: #fff; }
  .day.today .date-badge .dnum { color: #fff; }
  .date-badge .dnum { font-family: var(--heading-font), 'Quicksand', sans-serif; font-weight: 700; font-size: 21px; color: var(--ink); }
  .date-badge .dmon { font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700; margin-top: 2px; opacity: .85; }

  .day-headtext { flex: 1 1 auto; min-width: 0; }
  .dow {
    font-family: var(--heading-font), 'Quicksand', sans-serif; font-weight: 600;
    font-size: 17px; color: var(--ink); text-transform: capitalize;
    display: flex; align-items: center; gap: 8px;
  }
  .day.today .dow .today-tag {
    font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    color: #fff; background: var(--accent-deep); padding: 2px 8px; border-radius: 999px;
  }
  .holiday-name {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 4px;
    font-size: 13px; font-weight: 700; color: var(--accent-deep);
  }
  .holiday-name::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-deep);
  }
  .holiday-name.special { color: var(--soft); }
  .holiday-name.special::before { background: var(--soft); }

  /* ---- entries ---- */
  .entries { margin-top: 11px; display: flex; flex-direction: column; gap: 2px; }
  .entry {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 5px 4px 5px 2px;
    border-radius: 10px;
  }
  .entry:hover { background: var(--entry-hover); }
  .entry-bullet {
    flex: 0 0 auto; margin-top: 8px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
  }
  .entry textarea {
    flex: 1 1 auto; min-width: 0;
    border: none; outline: none; resize: none; background: transparent;
    font-family: 'Nunito', sans-serif; font-size: 15.5px; line-height: 1.42;
    color: var(--ink); padding: 0; margin: 0;
    overflow: hidden;
  }
  .entry textarea::placeholder { color: var(--soft); opacity: .7; }
  .entry-del {
    flex: 0 0 auto; appearance: none; border: none; background: transparent; cursor: pointer;
    color: var(--soft); width: 24px; height: 24px; border-radius: 50%;
    display: grid; place-items: center; opacity: 0; transition: opacity .14s ease, color .14s ease;
    margin-top: 2px;
  }
  .entry:hover .entry-del, .entry:focus-within .entry-del { opacity: .7; }
  .entry-del:hover { color: var(--accent-deep); background: var(--entry-hover); opacity: 1; }
  .entry-del svg { width: 13px; height: 13px; }

  .add-entry {
    appearance: none; border: none; background: transparent; cursor: pointer;
    margin-top: 7px; padding: 5px 4px;
    color: var(--soft); font-family: var(--heading-font), 'Quicksand', sans-serif; font-weight: 600; font-size: 13.5px;
    display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
    transition: color .16s ease;
  }
  .add-entry:hover { color: var(--accent-deep); }
  .add-entry .plus {
    width: 19px; height: 19px; border-radius: 50%;
    border: 1.5px solid currentColor; display: grid; place-items: center; font-size: 14px; line-height: 1;
  }
  .day.has-entries .add-entry { font-size: 13px; opacity: .9; }

  .footer-note {
    text-align: center; margin-top: 26px;
    font-size: 12px; color: var(--soft); opacity: .8;
    font-family: var(--heading-font), 'Quicksand', sans-serif; letter-spacing: .04em;
  }

  /* ---- entry color picker ---- */
  .entry-color { position: relative; flex: 0 0 auto; margin-top: 3px; }
  .entry-color-btn { appearance:none;border:none;background:transparent;cursor:pointer;
    width:24px;height:24px;border-radius:50%;display:grid;place-items:center;padding:0; }
  .entry-color-btn:hover { background: var(--entry-hover); }
  .entry-color-btn .dot { width:12px;height:12px;border-radius:50%;
    box-shadow:0 0 0 1px rgba(0,0,0,.14); }
  .color-pop { position:absolute; top:27px; left:-4px; z-index:30;
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:8px; display:flex; gap:8px; box-shadow:0 12px 28px var(--shadow); }
  .color-pop .sw { appearance:none;width:22px;height:22px;border-radius:50%;
    border:2px solid transparent; cursor:pointer; padding:0;
    box-shadow:0 0 0 1px rgba(0,0,0,.1); transition:transform .12s ease; }
  .color-pop .sw:hover { transform:scale(1.14); }
  .color-pop .sw.sel { box-shadow:0 0 0 2px var(--accent-deep); }

  /* ---- view toggle ---- */
  .viewseg { display:inline-flex; background:var(--badge); border-radius:999px; padding:3px;
    max-width:100%; overflow-x:auto; scrollbar-width:none; }
  .viewseg::-webkit-scrollbar { display:none; }
  .viewseg button { appearance:none;border:none;background:transparent;cursor:pointer;
    font-family:var(--heading-font),sans-serif; font-weight:600; font-size:12.5px;
    color:var(--soft); padding:6px 10px; border-radius:999px; white-space:nowrap;
    transition:background .16s ease,color .16s ease; }
  .viewseg button.on { background:var(--surface); color:var(--accent-deep);
    box-shadow:0 2px 8px var(--shadow); }

  .week-cap { margin-top:11px; font-size:13px; color:var(--soft); font-weight:600; padding-left:2px; }

  /* ---- month grid ---- */
  .month-wrap { margin-top: 20px; }
  .dow-head { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; margin-bottom:9px; padding:0 2px; }
  .dow-sticky { position:sticky; top:var(--head-h,0px); z-index:5; padding-top:8px; padding-bottom:8px;
    margin-bottom:2px; background:linear-gradient(var(--bg) 72%, transparent); }
  .msect { margin-top:4px; }
  .msect-cap { font-family:var(--heading-font),'Comfortaa',sans-serif; font-weight:600;
    font-size:20px; color:var(--ink); margin:26px 0 12px 2px; letter-spacing:-.01em; }
  .msect-cap .yr { color:var(--accent-deep); font-weight:500; }
  .dow-head span { text-align:center; font-family:var(--heading-font),sans-serif;
    font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--soft); }
  .month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; }
  .mcell { position:relative; aspect-ratio:1/1; border-radius:15px;
    background:var(--surface); border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:0 3px 11px var(--shadow); appearance:none;
    transition:transform .14s ease, box-shadow .14s ease; }
  .mcell:hover { box-shadow:0 6px 16px var(--shadow); }
  .mcell:active { transform:scale(.92); }
  .mcell .n { font-family:var(--heading-font),sans-serif; font-weight:600; font-size:16px; color:var(--ink); }
  .mcell.out { background:transparent; border-color:transparent; box-shadow:none; cursor:default; }
  .mcell.out:hover { box-shadow:none; }
  .mcell.out .n { color:var(--soft); opacity:.4; }
  .mcell.holiday { background:var(--holiday-bg); border-color:var(--accent); }
  .mcell.today { box-shadow:0 5px 14px var(--shadow), inset 0 0 0 2px var(--accent-deep); }
  .mcell.today .n { color:var(--accent-deep); }
  .mcell .ev { position:absolute; bottom:8px; width:6px; height:6px; border-radius:50%; background:var(--accent-deep); }
  .month-hint { text-align:center; margin-top:18px; font-size:12.5px; color:var(--soft);
    font-family:var(--heading-font),sans-serif; opacity:.85; }

  /* ---- list view ---- */
  .list-wrap { margin-top: 20px; display:flex; flex-direction:column; gap:12px; }
  .list-day { display:block; width:100%; text-align:left; appearance:none; cursor:pointer;
    background:var(--surface); border:1px solid var(--line); border-radius:18px;
    padding:14px 16px; box-shadow:0 5px 16px var(--shadow); font-family:inherit;
    transition:box-shadow .16s ease, transform .16s ease; }
  .list-day:hover { box-shadow:0 9px 22px var(--shadow); }
  .list-day:active { transform:scale(.99); }
  .list-date { display:flex; align-items:baseline; gap:9px; margin-bottom:9px; flex-wrap:wrap; }
  .list-dow { font-family:var(--heading-font),sans-serif; font-weight:600; font-size:16px;
    color:var(--ink); text-transform:capitalize; }
  .list-num { font-size:13px; color:var(--soft); font-weight:600; white-space:nowrap; }
  .list-hol { font-size:11.5px; font-weight:700; color:var(--accent-deep);
    background:var(--badge); padding:3px 9px; border-radius:999px; white-space:nowrap; }
  .list-items { display:flex; flex-direction:column; gap:6px; }
  .list-item { display:flex; align-items:flex-start; gap:9px; font-size:15px; line-height:1.42; }
  .list-item .b { flex:0 0 auto; margin-top:7px; width:7px; height:7px; border-radius:50%; }
  .list-empty { text-align:center; margin-top:64px; color:var(--soft); line-height:1.65;
    font-family:var(--heading-font),sans-serif; font-size:14.5px; }

  /* ---- picked day pulse ---- */
  @keyframes pickpulse {
    0%,68% { box-shadow:0 10px 28px var(--shadow), inset 0 0 0 3px var(--accent-deep); }
    100% { box-shadow:0 6px 20px var(--shadow), inset 0 0 0 0 var(--accent-deep); }
  }
  .day.picked:not(.today) { animation: pickpulse 1.8s ease; }

  /* ---- events view (Viðburðir) ---- */
  .ev-wrap { margin-top: 20px; display:flex; flex-direction:column; gap:13px; }
  .ev-addbtn { appearance:none; cursor:pointer; width:100%;
    border:1.5px dashed var(--accent); background:var(--surface);
    color:var(--accent-deep); font-family:var(--heading-font),sans-serif; font-weight:600; font-size:15px;
    padding:15px; border-radius:18px; display:flex; align-items:center; justify-content:center; gap:9px;
    transition:background .16s ease, transform .12s ease; }
  .ev-addbtn:hover { background:var(--holiday-bg); }
  .ev-addbtn:active { transform:scale(.99); }
  .ev-plus { width:24px; height:24px; border-radius:50%; background:var(--accent-deep); color:#fff;
    display:grid; place-items:center; font-size:18px; line-height:1; }

  .ev-form { background:var(--surface); border:1px solid var(--line); border-radius:22px;
    padding:16px; box-shadow:0 6px 20px var(--shadow); display:flex; flex-direction:column; gap:12px; }
  .ev-input { border:none; outline:none; background:var(--badge); border-radius:12px;
    padding:12px 14px; font-family:'Nunito',sans-serif; font-size:16px; color:var(--ink); }
  .ev-input::placeholder { color:var(--soft); }
  .ev-types { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .ev-tagchip-wrap { position:relative; display:inline-flex; }
  .ev-tagdel { position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%;
    border:none; background:var(--soft); color:#fff; font-size:12px; line-height:1; cursor:pointer;
    display:grid; place-items:center; box-shadow:0 1px 3px var(--shadow); padding:0; }
  .ev-tagdel:hover { background:var(--accent-deep); }
  .ev-typenew { border-style:dashed !important; color:var(--accent-deep) !important; }
  .ev-newtag { display:inline-flex; align-items:center; gap:4px; }
  .ev-newtag-in { border:1.5px solid var(--accent); background:var(--surface); border-radius:999px;
    padding:6px 12px; font-family:'Nunito',sans-serif; font-size:13px; color:var(--ink); outline:none; width:120px; }
  .ev-newtag-ok { appearance:none; cursor:pointer; border:none; background:var(--accent-deep); color:#fff;
    width:28px; height:28px; border-radius:50%; font-size:14px; display:grid; place-items:center; }
  .ev-typebtn { appearance:none; cursor:pointer; border:1.5px solid var(--line);
    background:var(--surface); color:var(--soft); border-radius:999px; padding:7px 13px;
    font-family:var(--heading-font),sans-serif; font-weight:600; font-size:13px;
    display:inline-flex; align-items:center; gap:7px; transition:border-color .14s ease, color .14s ease; }
  .ev-typebtn.on { background:var(--holiday-bg); }
  .ev-dot { width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
  .ev-daterow { display:flex; gap:9px; }
  .ev-select { appearance:none; flex:0 0 auto; border:1px solid var(--line); background:var(--surface);
    border-radius:12px; padding:11px 14px; font-family:'Nunito',sans-serif; font-size:15px; color:var(--ink);
    cursor:pointer; outline:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23b197a1' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center; padding-right:30px; }
  .ev-select.grow { flex:1 1 auto; }
  .ev-yearrow { display:flex; align-items:center; gap:9px; font-family:var(--heading-font),sans-serif;
    font-weight:600; font-size:13.5px; color:var(--soft); cursor:pointer; }
  .ev-yearrow input[type=checkbox] { width:18px; height:18px; accent-color:var(--accent-deep); cursor:pointer; }
  .ev-year { width:88px; border:1px solid var(--line); background:var(--surface); border-radius:10px;
    padding:7px 10px; font-family:'Nunito',sans-serif; font-size:14px; color:var(--ink); outline:none; }
  .ev-actions { display:flex; gap:9px; justify-content:flex-end; align-items:center; margin-top:2px; }
  .ev-delbig { appearance:none; cursor:pointer; border:none; background:transparent; color:var(--accent-deep);
    font-family:var(--heading-font),sans-serif; font-weight:600; font-size:14px; padding:10px 14px; border-radius:12px;
    margin-right:auto; }
  .ev-delbig:hover { background:var(--badge); }
  .ev-cancel { appearance:none; cursor:pointer; border:none; background:transparent; color:var(--soft);
    font-family:var(--heading-font),sans-serif; font-weight:600; font-size:14px; padding:10px 14px; border-radius:12px; }
  .ev-cancel:hover { background:var(--badge); }
  .ev-save { appearance:none; cursor:pointer; border:none; background:var(--accent-deep); color:#fff;
    font-family:var(--heading-font),sans-serif; font-weight:600; font-size:14px; padding:10px 18px; border-radius:12px;
    transition:transform .12s ease, filter .14s ease; }
  .ev-save:hover { filter:brightness(1.05); }
  .ev-save:active { transform:scale(.97); }

  .ev-list { display:flex; flex-direction:column; gap:11px; }
  .ev-card { position:relative; display:flex; align-items:center; gap:13px; cursor:pointer;
    background:var(--surface); border:1px solid var(--line); border-radius:20px;
    padding:13px 15px; box-shadow:0 5px 16px var(--shadow);
    transition:box-shadow .18s ease, transform .18s ease; }
  .ev-card:hover { box-shadow:0 9px 24px var(--shadow); }
  .ev-card:active { transform:scale(.995); }
  .ev-card.soon { box-shadow:0 7px 22px var(--shadow), inset 0 0 0 1.5px var(--accent); }
  .ev-badge { flex:0 0 auto; width:50px; height:50px; border-radius:15px; color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1; }
  .ev-bd-day { font-family:var(--heading-font),sans-serif; font-weight:700; font-size:21px; }
  .ev-bd-mon { font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; margin-top:3px; opacity:.92; }
  .ev-main { flex:1 1 auto; min-width:0; }
  .ev-title { font-family:var(--heading-font),sans-serif; font-weight:600; font-size:16.5px; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ev-meta { display:flex; align-items:center; gap:9px; margin-top:4px; flex-wrap:wrap; }

/* holidays-intl.js — public holidays for Iceland / United States / Spain.
   Attaches window.EdyHolidays. Holiday NAMES are localized to is/en/es so the
   label follows the app language; the date set follows the chosen country.
   kind: 'public' (red day) | 'special' (half-day / observance). */
window.EdyHolidays = (function () {
  function pad(n) { return String(n).padStart(2, '0'); }
  function key(y, m, d) { return `${y}-${pad(m)}-${pad(d)}`; }
  function addDays(date, n) { const d = new Date(date.getTime()); d.setDate(d.getDate() + n); return d; }
  function k(date) { return key(date.getFullYear(), date.getMonth() + 1, date.getDate()); }

  // Anonymous Gregorian algorithm — Easter Sunday for a given year.
  function easterSunday(year) {
    const a = year % 19, b = Math.floor(year / 100), c = year % 100;
    const d = Math.floor(b / 4), e = b % 4;
    const f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3);
    const h = (19 * a + b - d - g + 15) % 30;
    const i = Math.floor(c / 4), kk = c % 4;
    const l = (32 + 2 * e + 2 * i - h - kk) % 7;
    const m = Math.floor((a + 11 * h + 22 * l) / 451);
    const month = Math.floor((h + l - 7 * m + 114) / 31);
    const day = ((h + l - 7 * m + 114) % 31) + 1;
    return new Date(year, month - 1, day);
  }
  // dow: 0=Sun..6=Sat. nth (1-based) weekday of a month (month 0-based).
  function nthWeekday(year, month, dow, n) {
    let count = 0;
    for (let d = 1; d <= 31; d++) {
      const dt = new Date(year, month, d);
      if (dt.getMonth() !== month) break;
      if (dt.getDay() === dow) { count++; if (count === n) return dt; }
    }
    return null;
  }
  function lastWeekday(year, month, dow) {
    const last = new Date(year, month + 1, 0).getDate();
    for (let d = last; d >= 1; d--) {
      const dt = new Date(year, month, d);
      if (dt.getDay() === dow) return dt;
    }
    return null;
  }

  // id → localized name. Each holiday is shown in the app's current language.
  const NAMES = {
    // ── Iceland ──
    is_newyear:     { is: 'Nýársdagur',             en: "New Year's Day",        es: 'Año Nuevo' },
    is_maundy:      { is: 'Skírdagur',              en: 'Maundy Thursday',       es: 'Jueves Santo' },
    is_goodfri:     { is: 'Föstudagurinn langi',    en: 'Good Friday',           es: 'Viernes Santo' },
    is_easter:      { is: 'Páskadagur',             en: 'Easter Sunday',         es: 'Domingo de Pascua' },
    is_eastermon:   { is: 'Annar í páskum',         en: 'Easter Monday',         es: 'Lunes de Pascua' },
    is_firstsummer: { is: 'Sumardagurinn fyrsti',   en: 'First Day of Summer',   es: 'Primer Día de Verano' },
    is_labour:      { is: 'Verkalýðsdagurinn',      en: 'Labour Day',            es: 'Día del Trabajo' },
    is_ascension:   { is: 'Uppstigningardagur',     en: 'Ascension Day',         es: 'Ascensión' },
    is_whit:        { is: 'Hvítasunnudagur',        en: 'Whit Sunday',           es: 'Pentecostés' },
    is_whitmon:     { is: 'Annar í hvítasunnu',     en: 'Whit Monday',           es: 'Lunes de Pentecostés' },
    is_nationalday: { is: 'Þjóðhátíðardagurinn',    en: 'National Day',          es: 'Día Nacional' },
    is_commerce:    { is: 'Frídagur verslunarmanna', en: 'Commerce Day',         es: 'Día del Comercio' },
    is_xmaseve:     { is: 'Aðfangadagur',           en: 'Christmas Eve',         es: 'Nochebuena' },
    is_xmas:        { is: 'Jóladagur',              en: 'Christmas Day',         es: 'Navidad' },
    is_boxing:      { is: 'Annar í jólum',          en: 'Boxing Day',            es: 'San Esteban' },
    is_nye:         { is: 'Gamlársdagur',           en: "New Year's Eve",        es: 'Nochevieja' },
    // ── United States ──
    us_newyear:      { is: 'Nýársdagur',            en: "New Year's Day",        es: 'Año Nuevo' },
    us_mlk:          { is: 'Dagur Martin Luther King', en: 'Martin Luther King Jr. Day', es: 'Día de Martin Luther King' },
    us_presidents:   { is: 'Forsetadagur',          en: "Presidents' Day",       es: 'Día de los Presidentes' },
    us_memorial:     { is: 'Minningardagur',        en: 'Memorial Day',          es: 'Día de los Caídos' },
    us_juneteenth:   { is: 'Juneteenth',            en: 'Juneteenth',            es: 'Juneteenth' },
    us_independence: { is: 'Sjálfstæðisdagur',      en: 'Independence Day',      es: 'Día de la Independencia' },
    us_labor:        { is: 'Verkalýðsdagur',        en: 'Labor Day',             es: 'Día del Trabajo' },
    us_columbus:     { is: 'Kólumbusardagur',       en: 'Columbus Day',          es: 'Día de la Raza' },
    us_veterans:     { is: 'Dagur uppgjafahermanna', en: 'Veterans Day',         es: 'Día de los Veteranos' },
    us_thanksgiving: { is: 'Þakkargjörðarhátíð',    en: 'Thanksgiving',          es: 'Acción de Gracias' },
    us_xmaseve:      { is: 'Aðfangadagur',          en: 'Christmas Eve',         es: 'Nochebuena' },
    us_xmas:         { is: 'Jóladagur',             en: 'Christmas Day',         es: 'Navidad' },
    us_nye:          { is: 'Gamlársdagur',          en: "New Year's Eve",        es: 'Nochevieja' },
    // ── Spain ──
    es_newyear:      { is: 'Nýársdagur',            en: "New Year's Day",        es: 'Año Nuevo' },
    es_epiphany:     { is: 'Þrettándinn',           en: 'Epiphany',              es: 'Epifanía del Señor' },
    es_maundy:       { is: 'Skírdagur',             en: 'Maundy Thursday',       es: 'Jueves Santo' },
    es_goodfri:      { is: 'Föstudagurinn langi',   en: 'Good Friday',           es: 'Viernes Santo' },
    es_labour:       { is: 'Verkalýðsdagurinn',     en: 'Labour Day',            es: 'Fiesta del Trabajo' },
    es_assumption:   { is: 'Maríumessa',            en: 'Assumption of Mary',    es: 'Asunción de la Virgen' },
    es_national:     { is: 'Þjóðhátíðardagur Spánar', en: 'National Day of Spain', es: 'Fiesta Nacional de España' },
    es_allsaints:    { is: 'Allraheilagramessa',    en: "All Saints' Day",       es: 'Todos los Santos' },
    es_constitution: { is: 'Stjórnarskrárdagur',    en: 'Constitution Day',      es: 'Día de la Constitución' },
    es_immaculate:   { is: 'Hreinn getnaður',       en: 'Immaculate Conception', es: 'Inmaculada Concepción' },
    es_xmaseve:      { is: 'Aðfangadagur',          en: 'Christmas Eve',         es: 'Nochebuena' },
    es_xmas:         { is: 'Jóladagur',             en: 'Christmas Day',         es: 'Navidad' },
    es_nye:          { is: 'Gamlársdagur',          en: "New Year's Eve",        es: 'Nochevieja' },
  };

  function iceland(year) {
    const h = {};
    const easter = easterSunday(year);
    h[k(addDays(easter, -3))] = { id: 'is_maundy', kind: 'public' };
    h[k(addDays(easter, -2))] = { id: 'is_goodfri', kind: 'public' };
    h[k(easter)] = { id: 'is_easter', kind: 'public' };
    h[k(addDays(easter, 1))] = { id: 'is_eastermon', kind: 'public' };
    h[k(addDays(easter, 39))] = { id: 'is_ascension', kind: 'public' };
    h[k(addDays(easter, 49))] = { id: 'is_whit', kind: 'public' };
    h[k(addDays(easter, 50))] = { id: 'is_whitmon', kind: 'public' };
    // Sumardagurinn fyrsti — first Thursday in Apr 19–25
    for (let day = 19; day <= 25; day++) {
      const d = new Date(year, 3, day);
      if (d.getDay() === 4) { h[k(d)] = { id: 'is_firstsummer', kind: 'public' }; break; }
    }
    h[k(nthWeekday(year, 7, 1, 1))] = { id: 'is_commerce', kind: 'public' }; // 1st Mon Aug
    h[key(year, 1, 1)] = { id: 'is_newyear', kind: 'public' };
    h[key(year, 5, 1)] = { id: 'is_labour', kind: 'public' };
    h[key(year, 6, 17)] = { id: 'is_nationalday', kind: 'public' };
    h[key(year, 12, 25)] = { id: 'is_xmas', kind: 'public' };
    h[key(year, 12, 26)] = { id: 'is_boxing', kind: 'public' };
    h[key(year, 12, 24)] = { id: 'is_xmaseve', kind: 'special' };
    h[key(year, 12, 31)] = { id: 'is_nye', kind: 'special' };
    return h;
  }

  function usa(year) {
    const h = {};
    h[key(year, 1, 1)] = { id: 'us_newyear', kind: 'public' };
    h[k(nthWeekday(year, 0, 1, 3))] = { id: 'us_mlk', kind: 'public' };        // 3rd Mon Jan
    h[k(nthWeekday(year, 1, 1, 3))] = { id: 'us_presidents', kind: 'public' }; // 3rd Mon Feb
    h[k(lastWeekday(year, 4, 1))] = { id: 'us_memorial', kind: 'public' };     // last Mon May
    h[key(year, 6, 19)] = { id: 'us_juneteenth', kind: 'public' };
    h[key(year, 7, 4)] = { id: 'us_independence', kind: 'public' };
    h[k(nthWeekday(year, 8, 1, 1))] = { id: 'us_labor', kind: 'public' };      // 1st Mon Sep
    h[k(nthWeekday(year, 9, 1, 2))] = { id: 'us_columbus', kind: 'public' };   // 2nd Mon Oct
    h[key(year, 11, 11)] = { id: 'us_veterans', kind: 'public' };
    h[k(nthWeekday(year, 10, 4, 4))] = { id: 'us_thanksgiving', kind: 'public' }; // 4th Thu Nov
    h[key(year, 12, 25)] = { id: 'us_xmas', kind: 'public' };
    h[key(year, 12, 24)] = { id: 'us_xmaseve', kind: 'special' };
    h[key(year, 12, 31)] = { id: 'us_nye', kind: 'special' };
    return h;
  }

  function spain(year) {
    const h = {};
    const easter = easterSunday(year);
    h[key(year, 1, 1)] = { id: 'es_newyear', kind: 'public' };
    h[key(year, 1, 6)] = { id: 'es_epiphany', kind: 'public' };
    h[k(addDays(easter, -3))] = { id: 'es_maundy', kind: 'public' };  // Jueves Santo
    h[k(addDays(easter, -2))] = { id: 'es_goodfri', kind: 'public' }; // Viernes Santo
    h[key(year, 5, 1)] = { id: 'es_labour', kind: 'public' };
    h[key(year, 8, 15)] = { id: 'es_assumption', kind: 'public' };
    h[key(year, 10, 12)] = { id: 'es_national', kind: 'public' };
    h[key(year, 11, 1)] = { id: 'es_allsaints', kind: 'public' };
    h[key(year, 12, 6)] = { id: 'es_constitution', kind: 'public' };
    h[key(year, 12, 8)] = { id: 'es_immaculate', kind: 'public' };
    h[key(year, 12, 25)] = { id: 'es_xmas', kind: 'public' };
    h[key(year, 12, 24)] = { id: 'es_xmaseve', kind: 'special' };
    h[key(year, 12, 31)] = { id: 'es_nye', kind: 'special' };
    return h;
  }

  const COMPUTE = { IS: iceland, US: usa, ES: spain };
  const cache = {};
  function compute(country, year) {
    const ck = country + ':' + year;
    if (cache[ck]) return cache[ck];
    const fn = COMPUTE[country] || iceland;
    const r = fn(year);
    cache[ck] = r;
    return r;
  }
  function nameOf(id, lang) {
    const n = NAMES[id];
    return n ? (n[lang] || n.en || n.is) : id;
  }
  function lookup(country, lang, dateKey) {
    const year = parseInt(dateKey.slice(0, 4), 10);
    const h = compute(country, year)[dateKey];
    if (!h) return null;
    return { name: nameOf(h.id, lang), kind: h.kind };
  }

  return { NAMES, compute, nameOf, lookup };
})();

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

function newEntryId() { return 'en_' + Date.now().toString(36) + '_' + (_entrySeq++); }

/* ---------------- date helpers ---------------- */
function pad(n) { return String(n).padStart(2, '0'); }
function keyOf(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
function startOfWeek(d) { // Monday-based
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dow = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - dow);
  return x;
}
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function addDays(d, n) { const x = new Date(d.getTime()); x.setDate(x.getDate() + n); return x; }
function addMonths(d, n) { return new Date(d.getFullYear(), d.getMonth() + n, 1); }
function sameDay(a, b) { return keyOf(a) === keyOf(b); }
function sameMonth(a, b) { return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth(); }

/* ---------------- persistence ---------------- */
const STORE = 'edyCalendar.entries.v1';
function normEntry(e) {
  if (typeof e === 'string') return { id: newEntryId(), text: e, color: DEFAULT_COLOR, time: null };
  return { id: e.id || newEntryId(), text: e.text || '', color: e.color || DEFAULT_COLOR, time: e.time || null };
}
function loadEntries() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORE)) || {};
    const out = {};
    for (const k of Object.keys(raw)) out[k] = (raw[k] || []).map(normEntry);
    return out;
  } catch (e) { return {}; }
}
function saveEntries(obj) {
  try { localStorage.setItem(STORE, JSON.stringify(obj)); } catch (e) {}
}

function midnight(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function nextOccurrence(month, day, from) {
  const f0 = midnight(from);
  let d = new Date(f0.getFullYear(), month, day);
  if (d < f0) d = new Date(f0.getFullYear() + 1, month, day);
  return d;
}

function countdownText(n) {

  if (n === 1) return tr('cdTomorrow');

}

/* ---------------- entry row ---------------- */
const EntryRow = React.forwardRef(function EntryRow(
  { value, autoFocus, showTime, showGrip, gripProps, dragging, lifted, onText, onColor, onTime, onRemove, onEnter }, rootRef) {
  const ref = useRef(null);
  const wrapRef = useRef(null);
  const [pick, setPick] = useState(false);
  const fit = useCallback(() => {
    const el = ref.current; if (!el) return;
    el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px';
  }, []);
  useEffect(() => { fit(); }, [value.text, fit]);
  useEffect(() => { if (autoFocus && ref.current) ref.current.focus(); }, [autoFocus]);
  useEffect(() => {
    if (!pick) return;
    const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setPick(false); };
    document.addEventListener('pointerdown', onDoc);
    return () => document.removeEventListener('pointerdown', onDoc);
  }, [pick]);

  const cls = 'entry' + (dragging ? ' is-dragging' : '') + (lifted ? ' lifted' : '');
  return (
    <div className={cls} ref={rootRef}>
      {showGrip && (
        <span className="entry-grip" title="" aria-label="reorder" {...gripProps}>
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>
        </span>
      )}
      <div className="entry-color" ref={wrapRef}>
        <button className="entry-color-btn" title={tr('textColor')}
          onClick={() => setPick((p) => !p)}>
          <span className="dot" style={{ background: value.color }} />
        </button>
        {pick && (
          <ColorWheel value={value.color} withDefault
            onPick={(c) => { onColor(c); setPick(false); }} />
        )}
      </div>
      {showTime && (
        <span className="entry-time">
          <input type="time" value={value.time || ''}
            onChange={(e) => onTime(e.target.value || null)} />
        </span>
      )}
      <textarea
        ref={ref}
        rows={1}
        value={value.text}
        placeholder={tr('writeHere')}
        style={{ color: value.color }}
        onChange={(e) => { onText(e.target.value); fit(); }}
        onKeyDown={(e) => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onEnter && onEnter(); }
          if (e.key === 'Backspace' && value.text === '') { e.preventDefault(); onRemove(); }
        }}
        onBlur={() => { if (value.text.trim() === '') onRemove(); }}
      />
      <button className="entry-del" title={tr('delete')} onClick={onRemove}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
          <path d="M5 5l14 14M19 5L5 19" />
        </svg>
      </button>
    </div>
  );
});

/* ---------------- draggable entry list (per-day reorder) ---------------- */
function DraggableEntries({ dk, list, showTime, focusKey, onText, onColor, onTime, onRemove, onAdd, onReorder }) {
  const rowEls = useRef(new Map());     // id -> DOM node
  const drag = useRef(null);            // transient drag session
  const [dragId, setDragId] = useState(null);
  const [overIndex, setOverIndex] = useState(null);
  const canDrag = list.length > 1;

  const clearTransforms = () => {
    rowEls.current.forEach((el) => { if (el) { el.style.transform = ''; el.style.zIndex = ''; } });
  };

  const onGripDown = (id) => (e) => {
    if (!canDrag) return;
    e.preventDefault();
    const order = list.map((x) => x.id);
    const i0 = order.indexOf(id);
    const els = order.map((x) => rowEls.current.get(x));
    const rects = els.map((el) => el.getBoundingClientRect());
    // stride = distance between consecutive row tops (includes the 2px gap)
    let stride = rects[i0].height + 2;
    if (rects[i0 + 1]) stride = rects[i0 + 1].top - rects[i0].top;
    else if (rects[i0 - 1]) stride = rects[i0].top - rects[i0 - 1].top;
    drag.current = { id, i0, startY: e.clientY, rects, stride, order, target: i0 };
    setDragId(id); setOverIndex(i0);
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  };

  const onMove = (e) => {
    const d = drag.current; if (!d) return;
    const dy = e.clientY - d.startY;
    const self = rowEls.current.get(d.id);
    if (self) { self.style.transform = `translateY(${dy}px)`; self.style.zIndex = '6'; }
    // how many non-dragged rows sit (originally) above the pointer
    let t = 0;
    for (let j = 0; j < d.rects.length; j++) {
      if (j === d.i0) continue;
      const c = d.rects[j].top + d.rects[j].height / 2;
      if (e.clientY > c) t++;
    }
    d.target = t;
    // open a gap at the target slot by shifting the in-between rows
    d.order.forEach((id, j) => {
      if (id === d.id) return;
      const el = rowEls.current.get(id);
      if (!el) return;
      let ty = 0;
      if (d.target > d.i0 && j > d.i0 && j <= d.target) ty = -d.stride;
      else if (d.target < d.i0 && j >= d.target && j < d.i0) ty = d.stride;
      el.style.transform = ty ? `translateY(${ty}px)` : '';
    });
    setOverIndex(d.target);
  };

  const onUp = () => {
    const d = drag.current;
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    clearTransforms();
    setDragId(null); setOverIndex(null);
    drag.current = null;
    if (d && d.target !== d.i0) onReorder(dk, d.i0, d.target);
  };

  useEffect(() => () => {
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
  }, []);

  return (
    <div className={'entries' + (dragId ? ' dragging' : '')}>
      {list.map((entry, i) => (
        <EntryRow
          key={entry.id}
          ref={(el) => { if (el) rowEls.current.set(entry.id, el); else rowEls.current.delete(entry.id); }}
          value={entry}
          showTime={showTime}
          showGrip={canDrag}
          gripProps={{ onPointerDown: onGripDown(entry.id) }}
          dragging={dragId === entry.id}
          lifted={dragId === entry.id}
          autoFocus={focusKey === entry.id}
          onText={(v) => onText(dk, i, v)}
          onColor={(c) => onColor(dk, i, c)}
          onTime={(t) => onTime(dk, i, t)}
          onRemove={() => onRemove(dk, i)}
          onEnter={() => onAdd(dk)}
        />
      ))}
    </div>
  );
}

/* ---------------- day card ---------------- */
function DayCard({ date, isToday, picked, entries, dayEvents, tags, holiday, showTime, onAdd, onText, onColor, onTime, onRemove, onReorder, focusKey }) {
  const dow = WEEKDAYS[(date.getDay() + 6) % 7];
  const weekend = date.getDay() === 0 || date.getDay() === 6;
  const dk = keyOf(date);
  const list = entries || [];
  const cls = ['day'];
  if (isToday) cls.push('today');
  if (picked) cls.push('picked');
  if (holiday && holiday.kind === 'public') cls.push('holiday');
  if (weekend) cls.push('weekend');
  if (list.length) cls.push('has-entries');
  if (list.length > 1) cls.push('reorderable');

  return (
    <div className={cls.join(' ')}>
      <div className="day-top">
        <div className="date-badge">
          <span className="dnum">{date.getDate()}</span>
          <span className="dmon">{MONTHS_SHORT[date.getMonth()]}</span>
        </div>
        <div className="day-headtext">
          <div className="dow">
            {dow}
            {isToday && <span className="today-tag">{tr('today')}</span>}
          </div>
          {holiday && (
            <div className={'holiday-name' + (holiday.kind === 'special' ? ' special' : '')}>
              {holiday.name}
            </div>
          )}
        </div>
      </div>

      {dayEvents && dayEvents.length > 0 && (
        <div className="day-events">
          {dayEvents.map((e) => {
            const tp = findTag(tags, e.type);
            const age = ageText(e, date.getFullYear(), tags);
            return (
              <div key={e.id} className="day-ev">
                <span className="day-ev-dot" style={{ background: tp.color }} />
                <span className="day-ev-title" style={{ color: tp.color }}>{e.title}</span>
                <span className="day-ev-tag" style={{ color: tp.color, background: tp.color + '22' }}>

        <span className="plus">+</span>
        {list.length ? tr('addMore') : tr('addEntry')}
      </button>
    </div>
  );
}

/* ---------------- month view ---------------- */
function MonthGrid({ anchor, today, entries, events, onPick, holidayFor }) {
  const y = anchor.getFullYear(), m = anchor.getMonth();
  const offset = (new Date(y, m, 1).getDay() + 6) % 7;
  const dim = new Date(y, m + 1, 0).getDate();
  const weeks = Math.ceil((offset + dim) / 7);
  const start = addDays(new Date(y, m, 1), -offset);
  const cells = [];
  for (let i = 0; i < weeks * 7; i++) cells.push(addDays(start, i));
  const evMD = new Set((events || []).map((e) => e.month + '-' + e.day));

  return (
    <div className="month-grid">
      {cells.map((d) => {
        const dk = keyOf(d);
        const out = d.getMonth() !== m;
        const hol = holidayFor(dk);
        const isToday = sameDay(d, today);
        const has = entries[dk] && entries[dk].some((e) => e.text && e.text.trim());
        const hasEv = !out && evMD.has(d.getMonth() + '-' + d.getDate());
        const cls = ['mcell'];
        if (out) cls.push('out');
        if (!out && hol && hol.kind === 'public') cls.push('holiday');
        if (isToday) cls.push('today');
        return (
          <button key={dk} className={cls.join(' ')} disabled={out}
            title={hol ? hol.name : ''} onClick={() => !out && onPick(d)}>
            <span className="n">{d.getDate()}</span>
            {!out && (has || hasEv) && (
              <span className="mdots">
                {has && <span className="ev" />}
                {hasEv && <span className="ev evt" />}
              </span>
            )}
          </button>
        );
      })}
    </div>
  );
}

function MonthView({ anchor, today, entries, events, onPick, holidayFor }) {
  // Render the anchor month plus the following months so the user can simply
  // scroll down to browse ahead.
  const AHEAD = 13;
  const months = [];
  for (let i = 0; i < AHEAD; i++) months.push(addMonths(startOfMonth(anchor), i));

  return (
    <div className="month-wrap">
      <div className="dow-head dow-sticky">{DOW_MINI.map((d) => <span key={d}>{d}</span>)}</div>
      {months.map((mo, i) => (
        <div className="msect" key={keyOf(mo)}>
          {i > 0 && (
            <h2 className="msect-cap">
              {cap(MONTHS[mo.getMonth()])} <span className="yr">{mo.getFullYear()}</span>
            </h2>
          )}
          <MonthGrid anchor={mo} today={today} entries={entries} events={events} onPick={onPick} holidayFor={holidayFor} />
        </div>
      ))}
      <p className="month-hint">{tr('monthHint')}</p>
    </div>
  );
}

/* ---------------- list view (Yfirlit) ---------------- */
function ageText(ev, occYear, tags) {
  if (!ev.year) return null;
  const yrs = occYear - ev.year;
  if (yrs <= 0) return null;
  return ev.type === BIRTHDAY_TAG ? L.s.ageBirthday(yrs) : L.s.ageOther(yrs);
}
// Built-in tag labels follow the app language; user-created tags keep their text.
function tagLabel(tp) {
  if (tp.id === 'afmaeli') return tr('tagBirthday');
  if (tp.id === 'timamot') return tr('tagAnniv');
  return tp.label;
}

function ListView({ entries, events, tags, today, onPick, holidayFor }) {
  // events recur yearly → place each at its next occurrence date.
  const evByDay = {};
  events.forEach((e) => {
    const n = nextOccurrence(e.month, e.day, today);
    const k = keyOf(n);
    (evByDay[k] = evByDay[k] || []).push({ ...e, occYear: n.getFullYear() });
  });
  const entryKeys = Object.keys(entries).filter((k) => entries[k] && entries[k].some((e) => e.text && e.text.trim()));
  const keys = Array.from(new Set([...entryKeys, ...Object.keys(evByDay)])).sort();

  if (!keys.length) {
    return (
      <div className="list-empty">
        <div style={{ fontSize: 30, marginBottom: 12 }}>✿</div>
        {tr('listEmpty1')}<br />{tr('listEmpty2')}
      </div>
    );
  }
  return (
    <div className="list-wrap">
      {keys.map((k) => {
        const [y, m, da] = k.split('-').map(Number);
        const d = new Date(y, m - 1, da);
        const hol = holidayFor(k);
        const items = (entries[k] || []).filter((e) => e.text && e.text.trim());
        const evs = evByDay[k] || [];
        return (
          <button key={k} className="list-day" onClick={() => onPick(d)}>
            <div className="list-date">
              <span className="list-dow">{DOW_MINI[(d.getDay() + 6) % 7]}</span>
              <span className="list-num">{da}. {MONTHS[m - 1]} {y}</span>
              {hol && <span className="list-hol">{hol.name}</span>}
            </div>
            <div className="list-items">
              {evs.map((e) => {
                const tp = findTag(tags, e.type);
                const age = ageText(e, e.occYear, tags);
                return (
                  <div key={e.id} className="list-item list-ev">
                    <span className="b" style={{ background: tp.color }} />
                    <span style={{ color: tp.color, fontWeight: 700 }}>{e.title}</span>
                    <span className="list-evtag" style={{ color: tp.color, background: tp.color + '22' }}>
                      {tagLabel(tp)}{age ? ' · ' + age : ''}
                    </span>
                  </div>
                );
              })}
              {items.map((e, i) => (
                <div key={i} className="list-item">
                  <span className="b" style={{ background: e.color }} />
                  <span style={{ color: e.color }}>
                    {e.time && <span className="list-time">{e.time}</span>}{e.text}
                  </span>
                </div>
              ))}
            </div>
          </button>
        );
      })}
    </div>
  );
}

/* ---------------- events view (Viðburðir) ---------------- */
function EventsView({ events, tags, today, onAdd, onUpdate, onRemove, onAddTag, onRemoveTag, onTagColor }) {
  const [open, setOpen] = useState(false);
  const [editId, setEditId] = useState(null);
  const [title, setTitle] = useState('');
  const [day, setDay] = useState(today.getDate());
  const [month, setMonth] = useState(today.getMonth());
  const [type, setType] = useState('afmaeli');
  const [hasYear, setHasYear] = useState(false);
  const [year, setYear] = useState(today.getFullYear());
  const [addingTag, setAddingTag] = useState(false);
  const [tagName, setTagName] = useState('');

  const dim = new Date(2024, month + 1, 0).getDate(); // leap year → allow 29 Feb

  const openAdd = () => {
    setEditId(null); setTitle(''); setDay(today.getDate()); setMonth(today.getMonth());
    setType('afmaeli'); setHasYear(false); setYear(today.getFullYear());
    setAddingTag(false); setTagName(''); setOpen(true);
  };
  const openEdit = (e) => {
    setEditId(e.id); setTitle(e.title); setDay(e.day); setMonth(e.month);
    setType(tags.some((t) => t.id === e.type) ? e.type : (tags[0] && tags[0].id));
    setHasYear(!!e.year); setYear(e.year || today.getFullYear());
    setAddingTag(false); setTagName(''); setOpen(true);
  };
  const close = () => { setOpen(false); setAddingTag(false); setTagName(''); };

  const submit = () => {
    if (!title.trim()) return;
    const data = { title: title.trim(),
      day: Math.min(day, new Date(2024, month + 1, 0).getDate()), month, type,
      year: hasYear ? year : null };
    if (editId) onUpdate(editId, data);
    else onAdd({ id: 'ev_' + Date.now(), ...data });
    close();
  };

  const confirmTag = () => {
    const name = tagName.trim();
    if (!name) { setAddingTag(false); return; }
    const tg = onAddTag(name);
    if (tg) setType(tg.id);
    setTagName(''); setAddingTag(false);
  };

  const sorted = [...events].map((e) => {
    const next = nextOccurrence(e.month, e.day, today);
    return { ...e, next, days: daysUntil(next, today) };
  }).sort((a, b) => a.days - b.days);

  const selTag = tags.find((t) => t.id === type) || null;
  const thisYear = today.getFullYear();
  const yearOpts = [];
  for (let yv = thisYear + 1; yv >= thisYear - 120; yv--) yearOpts.push(yv);

  return (
    <div className="ev-wrap">
      {open ? (
        <div className="ev-form">
          <input className="ev-input" placeholder={tr('eventNamePh')} value={title} autoFocus
            onChange={(e) => setTitle(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter') submit(); }} />
          <div className="ev-types">
            {tags.map((tp) => {
              const builtin = DEFAULT_TAGS.some((d) => d.id === tp.id);
              return (
                <span key={tp.id} className="ev-tagchip-wrap">
                  <button className={'ev-typebtn' + (type === tp.id ? ' on' : '')}
                    style={type === tp.id ? { borderColor: tp.color, color: tp.color } : null}
                    onClick={() => setType(tp.id)}>
                    <span className="ev-dot" style={{ background: tp.color }} />{tagLabel(tp)}
                  </button>
                  {!builtin && (
                    <button className="ev-tagdel" title={tr('delTag')}
                      onClick={() => { onRemoveTag(tp.id); if (type === tp.id) setType('afmaeli'); }}>×</button>
                  )}
                </span>
              );
            })}
            {addingTag ? (
              <span className="ev-newtag">
                <input className="ev-newtag-in" placeholder={tr('newTagPh')} value={tagName} autoFocus
                  onChange={(e) => setTagName(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') confirmTag(); if (e.key === 'Escape') { setAddingTag(false); setTagName(''); } }} />
                <button className="ev-newtag-ok" onClick={confirmTag}>✓</button>
              </span>
            ) : (
              <button className="ev-typebtn ev-typenew" onClick={() => setAddingTag(true)}>{tr('newTag')}</button>
            )}
          </div>
          {selTag && (
            <div className="ev-tagcolors">
              <span className="ev-tagcolors-lbl">{tr('tagColor')}</span>
              <div className="ev-sw-row">
                {MATTE_COLORS.map((c) => (
                  <button key={c} type="button"
                    className={'ev-sw' + (selTag.color === c ? ' sel' : '')}
                    style={{ background: c }}
                    onClick={() => onTagColor(selTag.id, c)} />
                ))}
              </div>
            </div>
          )}
          <div className="ev-daterow">
            <select className="ev-select" value={day} onChange={(e) => setDay(+e.target.value)}>
              {Array.from({ length: dim }, (_, i) => i + 1).map((n) =>
                <option key={n} value={n}>{n}.</option>)}
            </select>
            <select className="ev-select grow" value={month} onChange={(e) => setMonth(+e.target.value)}>
              {MONTHS.map((mo, i) => <option key={i} value={i}>{cap(mo)}</option>)}
            </select>
          </div>
          <label className="ev-yearrow">
            <input type="checkbox" checked={hasYear} onChange={(e) => setHasYear(e.target.checked)} />
            <span>{tr('countYearsFrom')}</span>
            {hasYear && (
              <select className="ev-select ev-yearsel" value={year}
                onChange={(e) => setYear(+e.target.value)}>
                {yearOpts.map((yv) => <option key={yv} value={yv}>{yv}</option>)}
              </select>
            )}
          </label>
          <div className="ev-actions">
            {editId && (
              <button className="ev-delbig" onClick={() => { onRemove(editId); close(); }}>{tr('delete')}</button>
            )}
            <button className="ev-cancel" onClick={close}>{tr('cancel')}</button>
            <button className="ev-save" onClick={submit}>{editId ? tr('saveChanges') : tr('saveEvent')}</button>
          </div>
        </div>
      ) : (
        <button className="ev-addbtn" onClick={openAdd}>
          <span className="ev-plus">+</span> {tr('addEvent')}
        </button>
      )}

      {sorted.length === 0 && !open && (
        <div className="list-empty">
          <div style={{ fontSize: 30, marginBottom: 12 }}>♡</div>
          {tr('eventsEmpty1')}<br />{tr('eventsEmpty2')}
        </div>
      )}

      <div className="ev-list">
        {sorted.map((e) => {
          const tp = findTag(tags, e.type);
          const age = ageText(e, e.next.getFullYear(), tags);
          const soon = e.days <= 7;
          return (
            <div key={e.id} className={'ev-card' + (soon ? ' soon' : '')}
              onClick={() => openEdit(e)} role="button" tabIndex={0}>
              <div className="ev-badge" style={{ background: tp.color }}>
                <span className="ev-bd-day">{e.day}</span>
                <span className="ev-bd-mon">{MONTHS_SHORT[e.month]}</span>
              </div>
              <div className="ev-main">
                <div className="ev-title">{e.title}</div>
                <div className="ev-meta">
                  <span className="ev-typechip" style={{ color: tp.color }}>
                    <span className="ev-dot" style={{ background: tp.color }} />{tagLabel(tp)}
                  </span>
                  {age && <span className="ev-turns">{age}</span>}
                </div>
              </div>
              <div className="ev-right">
                <span className={'ev-count' + (e.days === 0 ? ' now' : '')}>{countdownText(e.days)}</span>
                <span className="ev-edit">{tr('edit')}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------- diary view (Dagbók) ---------------- */
function DiaryView({ diary, today, holidayFor, onText }) {
  const t0 = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const [sel, setSel] = useState(t0);
  const dk = keyOf(sel);
  const text = diary[dk] || '';
  const dow = WEEKDAYS[(sel.getDay() + 6) % 7];
  const isToday = sameDay(sel, today);
  const hol = holidayFor(dk);
  const taRef = useRef(null);
  useEffect(() => {
    const el = taRef.current; if (!el) return;
    el.style.height = 'auto'; el.style.height = Math.max(168, el.scrollHeight) + 'px';
  }, [text, dk]);

  const shift = (n) => setSel((d) => addDays(d, n));
  const dateLabel = `${sel.getDate()}. ${MONTHS[sel.getMonth()]} ${sel.getFullYear()}`;
  const keys = Object.keys(diary).filter((k) => diary[k] && diary[k].trim()).sort().reverse();

  return (
    <div className="diary-wrap">
      <div className="diary-nav">
        <button className="dn-btn" aria-label={tr('back')} onClick={() => shift(-1)}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 5l-7 7 7 7" /></svg>
        </button>
        <div className="dn-mid">
          <div className="dn-dow">{dow}</div>
          <div className="dn-date">{dateLabel}</div>
          {isToday
            ? <span className="dn-today">{tr('diaryToday')}</span>
            : <button className="dn-today" onClick={() => setSel(t0)}>{tr('diaryToday')}</button>}
          {hol && <div className="holiday-name" style={{ justifyContent: 'center', marginTop: 6 }}>{hol.name}</div>}
        </div>
        <button className="dn-btn" aria-label={tr('forward')} onClick={() => shift(1)}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M9 5l7 7-7 7" /></svg>
        </button>
      </div>

      <div className="diary-sheet">
        <textarea ref={taRef} value={text} placeholder={tr('diaryWrite')}
          onChange={(e) => onText(dk, e.target.value)} />
        <div className="diary-count">{text.trim().length || ''}</div>
      </div>

      {keys.length === 0 ? (
        <div className="list-empty" style={{ marginTop: 22 }}>
          <div style={{ fontSize: 30, marginBottom: 12 }}>✎</div>
          {tr('diaryEmpty1')}<br />{tr('diaryEmpty2')}
        </div>
      ) : (
        <div>
          <p className="set-label" style={{ margin: '4px 2px 12px' }}>{tr('diaryEarlier')}</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 11 }}>
            {keys.map((k) => {
              const [y, m, da] = k.split('-').map(Number);
              const d = new Date(y, m - 1, da);
              return (
                <button key={k} className={'diary-jumpto' + (k === dk ? ' cur' : '')}
                  onClick={() => setSel(new Date(y, m - 1, da))}>
                  <span className="dj-badge">
                    <span className="dn">{da}</span>
                    <span className="dm">{MONTHS_SHORT[m - 1]}</span>
                  </span>
                  <span className="dj-main">
                    <span className="dj-dow">{WEEKDAYS[(d.getDay() + 6) % 7]} · {y}</span>
                    <span className="dj-excerpt">{diary[k]}</span>
                  </span>
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

const SETTINGS_STORE = 'edyCalendar.settings.v1';

const DECORATIONS = ['none', 'flowers', 'stars', 'hearts', 'leaves'];
function loadSettings() {
  try {
    const s = { ...DEFAULT_SETTINGS, ...(JSON.parse(localStorage.getItem(SETTINGS_STORE)) || {}) };

    if (s.decoration == null) s.decoration = s.florals === false ? 'none' : 'flowers';
