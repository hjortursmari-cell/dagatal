<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Dagatal</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Dagatal" />
<meta name="theme-color" content="#f4e3e9" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Comfortaa:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ---- page surround ---- */
  .page {
    min-height: 100vh;
    min-height: 100dvh;
    background:
      radial-gradient(1200px 480px at 50% -8%, var(--bg-glow) 0%, transparent 60%),
      var(--bg);
    position: relative;
    overflow-x: hidden;
  }
  .florals { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .florals svg { position: absolute; }
  .florals .sprig-tr { top: -14px; right: -22px; width: 168px; height: auto; opacity: .55; }
  .florals .sprig-bl { bottom: -10px; left: -26px; width: 190px; height: auto; opacity: .5; transform: scaleX(-1); }
  .florals .sprig-mid { top: 44%; right: -54px; width: 120px; height: auto; opacity: .28; }

  .shell {
    position: relative;
    z-index: 1;
    max-width: 462px;
    margin: 0 auto;
    padding: 26px 18px 72px;
  }

  /* ---- header ---- */
  .cal-head { margin-bottom: 18px; }
  .kicker {
    font-family: var(--heading-font), 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: .32em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin: 0 0 10px 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .kicker::before, .kicker::after {
    content: ""; height: 1px; flex: 0 0 22px; background: var(--accent);
    opacity: .55;
  }
  .kicker span { white-space: nowrap; }
  .month-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .month-title {
    font-family: var(--heading-font), 'Comfortaa', sans-serif;
    font-weight: 600;
    font-size: 31px;
    line-height: 1.02;
    color: var(--ink);
    margin: 0;
    letter-spacing: -.01em;
  }
  .month-title .yr { color: var(--accent-deep); font-weight: 500; }
  .nav { display: flex; align-items: center; gap: 8px; }
  .nav-btn {
    appearance: none; border: none; cursor: pointer;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface);
    box-shadow: 0 2px 10px var(--shadow), inset 0 0 0 1px var(--line);
    color: var(--accent-deep);
    display: grid; place-items: center;
    transition: transform .16s ease, background .16s ease;
  }
  .nav-btn:hover { background: var(--holiday-bg); }
  .nav-btn:active { transform: scale(.9); }
  .nav-btn svg { width: 18px; height: 18px; }

  .subrow { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .week-label { font-size: 13.5px; color: var(--soft); font-weight: 600; }
  .today-btn {
    appearance: none; cursor: pointer;
    border: 1px solid var(--accent);
    background: var(--surface);
    color: var(--accent-deep);
    font-family: var(--heading-font), 'Quicksand', sans-serif; font-weight: 600; font-size: 13px;
    padding: 7px 16px; border-radius: 999px;
    transition: background .16s ease, transform .16s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .today-btn:hover { background: var(--holiday-bg); }
  .today-btn:active { transform: scale(.96); }
  .today-btn.is-current { opacity: .42; pointer-events: none; }

  /* ---- day cards ---- */
  .days { display: flex; flex-direction: column; gap: 13px; margin-top: 18px; }
  .day {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 15px 16px 14px;
    box-shadow: 0 6px 20px var(--shadow);
    transition: box-shadow .2s ease, transform .2s ease;
  }
  .day.weekend { background: var(--weekend); }
  .day.holiday { background: var(--holiday-bg); border-color: var(--accent); }
  .day.today {
    box-shadow: 0 8px 26px var(--shadow), inset 0 0 0 2px var(--accent-deep);
  }

  .day-top { display: flex; align-items: center; gap: 11px; }
  .date-badge {
    flex: 0 0 auto;
    width: 46px; height: 46px; border-radius: 14px;
    background: var(--badge); color: var(--accent-deep);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    line-height: 1;
  }
  .day.today .date-badge { background: var(--accent-deep); color: #fff; }
  .day.today .date-badge .dnum { color: #fff; }
  .date-badge .dnum { font-family: var(--heading-font), 'Quicksand', sans-serif; font-weight: 700; font-size: 21px; color: var(--ink); }
  .date-badge .dmon { font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700; margin-top: 2px; opacity: .85; }

  .day-headtext { flex: 1 1 auto; min-width: 0; }
  .dow {
    font-family: var(--heading-font), 'Quicksand', sans-serif; font-weight: 600;
    font-size: 17px; color: var(--ink); text-transform: capitalize;
    display: flex; align-items: center; gap: 8px;
  }
  .day.today .dow .today-tag {
    font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    color: #fff; background: var(--accent-deep); padding: 2px 8px; border-radius: 999px;
  }
  .holiday-name {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 4px;
    font-size: 13px; font-weight: 700; color: var(--accent-deep);
  }
  .holiday-name::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-deep);
  }
  .holiday-name.special { color: var(--soft); }
  .holiday-name.special::before { background: var(--soft); }

  /* ---- entries ---- */
  .entries { margin-top: 11px; display: flex; flex-direction: column; gap: 2px; }
  .entry {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 5px 4px 5px 2px;
    border-radius: 10px;
  }
  .entry:hover { background: var(--entry-hover); }
  .entry-bullet {
    flex: 0 0 auto; margin-top: 8px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
  }
  .entry textarea {
    flex: 1 1 auto; min-width: 0;
    border: none; outline: none; resize: none; background: transparent;
    font-family: 'Nunito', sans-serif; font-size: 15.5px; line-height: 1.42;
    color: var(--ink); padding: 0; margin: 0;
    overflow: hidden;
  }
  .entry textarea::placeholder { color: var(--soft); opacity: .7; }
  .entry-del {
    flex: 0 0 auto; appearance: none; border: none; background: transparent; cursor: pointer;
    color: var(--soft); width: 24px; height: 24px; border-radius: 50%;
    display: grid; place-items: center; opacity: 0; transition: opacity .14s ease, color .14s ease;
    margin-top: 2px;
  }
  .entry:hover .entry-del, .entry:focus-within .entry-del { opacity: .7; }
  .entry-del:hover { color: var(--accent-deep); background: var(--entry-hover); opacity: 1; }
  .entry-del svg { width: 13px; height: 13px; }

  .add-entry {
    appearance: none; border: none; background: transparent; cursor: pointer;
    margin-top: 7px; padding: 5px 4px;
    color: var(--soft); font-family: var(--heading-font), 'Quicksand', sans-serif; font-weight: 600; font-size: 13.5px;
    display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
    transition: color .16s ease;
  }
  .add-entry:hover { color: var(--accent-deep); }
  .add-entry .plus {
    width: 19px; height: 19px; border-radius: 50%;
    border: 1.5px solid currentColor; display: grid; place-items: center; font-size: 14px; line-height: 1;
  }
  .day.has-entries .add-entry { font-size: 13px; opacity: .9; }

  .footer-note {
    text-align: center; margin-top: 26px;
    font-size: 12px; color: var(--soft); opacity: .8;
    font-family: var(--heading-font), 'Quicksand', sans-serif; letter-spacing: .04em;
  }

  /* ---- entry color picker ---- */
  .entry-color { position: relative; flex: 0 0 auto; margin-top: 3px; }
  .entry-color-btn { appearance:none;border:none;background:transparent;cursor:pointer;
    width:24px;height:24px;border-radius:50%;display:grid;place-items:center;padding:0; }
  .entry-color-btn:hover { background: var(--entry-hover); }
  .entry-color-btn .dot { width:12px;height:12px;border-radius:50%;
    box-shadow:0 0 0 1px rgba(0,0,0,.14); }
  .color-pop { position:absolute; top:27px; left:-4px; z-index:30;
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:8px; display:flex; gap:8px; box-shadow:0 12px 28px var(--shadow); }
  .color-pop .sw { appearance:none;width:22px;height:22px;border-radius:50%;
    border:2px solid transparent; cursor:pointer; padding:0;
    box-shadow:0 0 0 1px rgba(0,0,0,.1); transition:transform .12s ease; }
  .color-pop .sw:hover { transform:scale(1.14); }
  .color-pop .sw.sel { box-shadow:0 0 0 2px var(--accent-deep); }

  /* ---- view toggle ---- */
  .viewseg { display:inline-flex; background:var(--badge); border-radius:999px; padding:3px; }
  .viewseg button { appearance:none;border:none;background:transparent;cursor:pointer;
    font-family:var(--heading-font),sans-serif; font-weight:600; font-size:13px;
    color:var(--soft); padding:6px 13px; border-radius:999px;
    transition:background .16s ease,color .16s ease; }
  .viewseg button.on { background:var(--surface); color:var(--accent-deep);
    box-shadow:0 2px 8px var(--shadow); }

  .week-cap { margin-top:11px; font-size:13px; color:var(--soft); font-weight:600; padding-left:2px; }

  /* ---- month grid ---- */
  .month-wrap { margin-top: 20px; }
  .dow-head { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; margin-bottom:9px; padding:0 2px; }
  .dow-sticky { position:sticky; top:0; z-index:5; padding-top:8px; padding-bottom:8px;
    margin-bottom:2px; background:linear-gradient(var(--bg) 72%, transparent); }
  .msect { margin-top:4px; }
  .msect-cap { font-family:var(--heading-font),'Comfortaa',sans-serif; font-weight:600;
    font-size:20px; color:var(--ink); margin:26px 0 12px 2px; letter-spacing:-.01em; }
  .msect-cap .yr { color:var(--accent-deep); font-weight:500; }
  .dow-head span { text-align:center; font-family:var(--heading-font),sans-serif;
    font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--soft); }
  .month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; }
  .mcell { position:relative; aspect-ratio:1/1; border-radius:15px;
    background:var(--surface); border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:0 3px 11px var(--shadow); appearance:none;
    transition:transform .14s ease, box-shadow .14s ease; }
  .mcell:hover { box-shadow:0 6px 16px var(--shadow); }
  .mcell:active { transform:scale(.92); }
  .mcell .n { font-family:var(--heading-font),sans-serif; font-weight:600; font-size:16px; color:var(--ink); }
  .mcell.out { background:transparent; border-color:transparent; box-shadow:none; cursor:default; }
  .mcell.out:hover { box-shadow:none; }
  .mcell.out .n { color:var(--soft); opacity:.4; }
  .mcell.holiday { background:var(--holiday-bg); border-color:var(--accent); }
  .mcell.today { box-shadow:0 5px 14px var(--shadow), inset 0 0 0 2px var(--accent-deep); }
  .mcell.today .n { color:var(--accent-deep); }
  .mcell .ev { position:absolute; bottom:8px; width:6px; height:6px; border-radius:50%; background:var(--accent-deep); }
  .month-hint { text-align:center; margin-top:18px; font-size:12.5px; color:var(--soft);
    font-family:var(--heading-font),sans-serif; opacity:.85; }

  /* ---- list view ---- */
  .list-wrap { margin-top: 20px; display:flex; flex-direction:column; gap:12px; }
  .list-day { display:block; width:100%; text-align:left; appearance:none; cursor:pointer;
    background:var(--surface); border:1px solid var(--line); border-radius:18px;
    padding:14px 16px; box-shadow:0 5px 16px var(--shadow); font-family:inherit;
    transition:box-shadow .16s ease, transform .16s ease; }
  .list-day:hover { box-shadow:0 9px 22px var(--shadow); }
  .list-day:active { transform:scale(.99); }
  .list-date { display:flex; align-items:baseline; gap:9px; margin-bottom:9px; flex-wrap:wrap; }
  .list-dow { font-family:var(--heading-font),sans-serif; font-weight:600; font-size:16px;
    color:var(--ink); text-transform:capitalize; }
  .list-num { font-size:13px; color:var(--soft); font-weight:600; white-space:nowrap; }
  .list-hol { font-size:11.5px; font-weight:700; color:var(--accent-deep);
    background:var(--badge); padding:3px 9px; border-radius:999px; white-space:nowrap; }
  .list-items { display:flex; flex-direction:column; gap:6px; }
  .list-item { display:flex; align-items:flex-start; gap:9px; font-size:15px; line-height:1.42; }
  .list-item .b { flex:0 0 auto; margin-top:7px; width:7px; height:7px; border-radius:50%; }
  .list-empty { text-align:center; margin-top:64px; color:var(--soft); line-height:1.65;
    font-family:var(--heading-font),sans-serif; font-size:14.5px; }

  /* ---- picked day pulse ---- */
  @keyframes pickpulse {
    0%,68% { box-shadow:0 10px 28px var(--shadow), inset 0 0 0 3px var(--accent-deep); }
    100% { box-shadow:0 6px 20px var(--shadow), inset 0 0 0 0 var(--accent-deep); }
  }
  .day.picked:not(.today) { animation: pickpulse 1.8s ease; }

  @media (max-width: 380px) {
    .month-title { font-size: 27px; }
    .shell { padding-left: 14px; padding-right: 14px; }
  }
</style>
</head>

<script type="text/babel" data-presets="react">
// holidays.jsx — Icelandic public holidays (almennir frídagar / lögbundnir frídagar)
// Computes fixed + movable (Easter-based) holidays for any year.
// Exposes window.icelandicHolidays(year) -> { 'YYYY-MM-DD': { name, kind } }
// kind: 'public' (red day) | 'special' (half-day / observance)

(function () {
  function pad(n) { return String(n).padStart(2, '0'); }
  function key(y, m, d) { return `${y}-${pad(m)}-${pad(d)}`; }

  // Anonymous Gregorian algorithm — returns Date of Easter Sunday for given year.
  function easterSunday(year) {
    const a = year % 19;
    const b = Math.floor(year / 100);
    const c = year % 100;
    const d = Math.floor(b / 4);
    const e = b % 4;
    const f = Math.floor((b + 8) / 25);
    const g = Math.floor((b - f + 1) / 3);
    const h = (19 * a + b - d - g + 15) % 30;
    const i = Math.floor(c / 4);
    const k = c % 4;
    const l = (32 + 2 * e + 2 * i - h - k) % 7;
    const m = Math.floor((a + 11 * h + 22 * l) / 451);
    const month = Math.floor((h + l - 7 * m + 114) / 31); // 3=March, 4=April
    const day = ((h + l - 7 * m + 114) % 31) + 1;
    return new Date(year, month - 1, day);
  }

  function addDays(date, n) {
    const d = new Date(date.getTime());
    d.setDate(d.getDate() + n);
    return d;
  }
  function k(date) { return key(date.getFullYear(), date.getMonth() + 1, date.getDate()); }

  const cache = {};

  function compute(year) {
    if (cache[year]) return cache[year];
    const h = {};
    const easter = easterSunday(year);

    // Movable, Easter-based
    h[k(addDays(easter, -3))] = { name: 'Skírdagur', kind: 'public' };
    h[k(addDays(easter, -2))] = { name: 'Föstudagurinn langi', kind: 'public' };
    h[k(easter)] = { name: 'Páskadagur', kind: 'public' };
    h[k(addDays(easter, 1))] = { name: 'Annar í páskum', kind: 'public' };
    h[k(addDays(easter, 39))] = { name: 'Uppstigningardagur', kind: 'public' };
    h[k(addDays(easter, 49))] = { name: 'Hvítasunnudagur', kind: 'public' };
    h[k(addDays(easter, 50))] = { name: 'Annar í hvítasunnu', kind: 'public' };

    // Sumardagurinn fyrsti — first Thursday after April 18 (Thu within Apr 19–25)
    for (let day = 19; day <= 25; day++) {
      const d = new Date(year, 3, day); // April
      if (d.getDay() === 4) { h[k(d)] = { name: 'Sumardagurinn fyrsti', kind: 'public' }; break; }
    }

    // Frídagur verslunarmanna — first Monday of August
    for (let day = 1; day <= 7; day++) {
      const d = new Date(year, 7, day); // August
      if (d.getDay() === 1) { h[k(d)] = { name: 'Frídagur verslunarmanna', kind: 'public' }; break; }
    }

    // Fixed dates
    h[key(year, 1, 1)] = { name: 'Nýársdagur', kind: 'public' };
    h[key(year, 5, 1)] = { name: 'Verkalýðsdagurinn', kind: 'public' };
    h[key(year, 6, 17)] = { name: 'Þjóðhátíðardagurinn', kind: 'public' };
    h[key(year, 12, 25)] = { name: 'Jóladagur', kind: 'public' };
    h[key(year, 12, 26)] = { name: 'Annar í jólum', kind: 'public' };

    // Half-days / observances
    h[key(year, 12, 24)] = { name: 'Aðfangadagur', kind: 'special' };
    h[key(year, 12, 31)] = { name: 'Gamlársdagur', kind: 'special' };

    cache[year] = h;
    return h;
  }

  window.icelandicHolidays = compute;
  window.icelandicHolidayFor = function (dateKey) {
    const year = parseInt(dateKey.slice(0, 4), 10);
    return compute(year)[dateKey] || null;
  };
})();

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>

function TweakRow({ label, value, children, inline = false }) {

    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

      '--bg': '#f4e3e9', '--bg-glow': '#fbeef2', '--surface': '#fffafb',
      '--ink': '#5a4750', '--soft': '#b197a1', '--accent': '#e9a9bd', '--accent-deep': '#cf7691',
      '--line': '#f2dde4', '--holiday-bg': '#fbe5ed', '--badge': '#fbecf1', '--weekend': '#fff6f8',
      '--shadow': 'rgba(196,120,145,0.14)', '--entry-hover': '#fbeef2', '--floral': '#bcc6a6',
    },
  },
  mauve: {
    label: 'Lillablátt', dots: ['#ece6f3', '#b89fd4', '#8f6fc0'],
    vars: {
      '--bg': '#ebe5f2', '--bg-glow': '#f5f0fb', '--surface': '#fdfbff',
      '--ink': '#514760', '--soft': '#a395b3', '--accent': '#bda3d8', '--accent-deep': '#8d6dbe',
      '--line': '#e6def0', '--holiday-bg': '#efe8f8', '--badge': '#efe9f8', '--weekend': '#f8f5fc',
      '--shadow': 'rgba(126,98,170,0.15)', '--entry-hover': '#f3eefa', '--floral': '#aeb6cf',
    },
  },
  cream: {
    label: 'Gyllt', dots: ['#f1e9dc', '#d8b86a', '#b08a35'],
    vars: {
      '--bg': '#f1e8d9', '--bg-glow': '#fbf4e7', '--surface': '#fffdf8',
      '--ink': '#5d5340', '--soft': '#b0a283', '--accent': '#d8b86a', '--accent-deep': '#b18b3c',
      '--line': '#ece0c9', '--holiday-bg': '#f8efda', '--badge': '#f6eed9', '--weekend': '#fdf9ee',
      '--shadow': 'rgba(176,138,53,0.15)', '--entry-hover': '#f8f1e1', '--floral': '#bcae84',
    },
  },
  rose: {
    label: 'Rós & salvía', dots: ['#e7e4da', '#c98b94', '#a96670'],
    vars: {
      '--bg': '#e8e6dd', '--bg-glow': '#f4f2ea', '--surface': '#fffafa',
      '--ink': '#5e4f4c', '--soft': '#a8978f', '--accent': '#cf929b', '--accent-deep': '#a96670',
      '--line': '#eadfdd', '--holiday-bg': '#f4e4e5', '--badge': '#f4e7e7', '--weekend': '#f6f3ec',
      '--shadow': 'rgba(140,96,100,0.14)', '--entry-hover': '#f3eceb', '--floral': '#9aab8c',
    },
  },
};

const FONTS = {
  Comfortaa: "'Comfortaa', sans-serif",
  Quicksand: "var(--heading-font), 'Quicksand', sans-serif",
};

// Per-entry text colours — soft, readable on light surfaces.
const TEXT_COLORS = [
  { name: 'Rautt',       value: '#e24c63' },
  { name: 'Fjólublátt',  value: '#b89fd4' },
  { name: 'Svart',       value: '#2a2530' },
  { name: 'Blátt',       value: '#4f9ed9' },
  { name: 'Neonbleikt',  value: '#fb44a2' },
  { name: 'Grænt',       value: '#43b07f' },
];
const DEFAULT_COLOR = '#2a2530';

/* ---------------- date helpers ---------------- */
function pad(n) { return String(n).padStart(2, '0'); }
function keyOf(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
function startOfWeek(d) { // Monday-based
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dow = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - dow);
  return x;
}
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function addDays(d, n) { const x = new Date(d.getTime()); x.setDate(x.getDate() + n); return x; }
function addMonths(d, n) { return new Date(d.getFullYear(), d.getMonth() + n, 1); }
function sameDay(a, b) { return keyOf(a) === keyOf(b); }
function sameMonth(a, b) { return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth(); }

/* ---------------- persistence ---------------- */
const STORE = 'edyCalendar.entries.v1';
function normEntry(e) {
  if (typeof e === 'string') return { text: e, color: DEFAULT_COLOR };
  return { text: e.text || '', color: e.color || DEFAULT_COLOR };
}
function loadEntries() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORE)) || {};
    const out = {};
    for (const k of Object.keys(raw)) out[k] = (raw[k] || []).map(normEntry);
    return out;
  } catch (e) { return {}; }
}
function saveEntries(obj) {
  try { localStorage.setItem(STORE, JSON.stringify(obj)); } catch (e) {}
}

/* ---------------- florals ---------------- */
function Flower({ cx, cy, s = 1 }) {
  const petals = [0, 72, 144, 216, 288].map((a) => (
    <ellipse key={a} cx={cx} cy={cy - 10 * s} rx={5.4 * s} ry={9.6 * s}
      fill="var(--accent)" transform={`rotate(${a} ${cx} ${cy})`} />
  ));
  return (
    <g opacity="0.92">
      {petals}
      <circle cx={cx} cy={cy} r={4.4 * s} fill="var(--accent-deep)" />
    </g>
  );
}
function Sprig({ className }) {
  return (
    <svg className={className} viewBox="0 0 200 240" fill="none">
      <g stroke="var(--floral)" strokeWidth="2" strokeLinecap="round" fill="none">
        <path d="M150 6 C120 50 112 92 120 150 C124 184 116 212 96 232" />
        <path d="M120 60 C92 52 70 60 56 84" />
        <path d="M120 60 C118 36 128 18 152 10" />
        <path d="M126 112 C150 108 172 116 184 140" />
        <path d="M118 150 C96 150 78 162 70 188" />
        <path d="M65 86 C55 78 44 78 36 86 C46 92 58 92 65 86 Z" fill="var(--floral)" fillOpacity="0.32" />
        <path d="M183 132 C193 124 204 126 210 134 C201 142 190 141 183 132 Z" fill="var(--floral)" fillOpacity="0.32" />
        <path d="M78 184 C70 174 58 172 49 178 C58 188 70 191 78 184 Z" fill="var(--floral)" fillOpacity="0.32" />
      </g>
      <Flower cx={150} cy={10} s={1.15} />
      <Flower cx={52} cy={86} s={0.95} />
      <Flower cx={186} cy={138} s={0.82} />
      <Flower cx={64} cy={190} s={1.05} />
    </svg>
  );
}
function Florals() {
  return (
    <div className="florals" aria-hidden="true">
      <Sprig className="sprig-tr" />
      <Sprig className="sprig-bl" />
    </div>
  );
}

/* ---------------- entry row ---------------- */
function EntryRow({ value, autoFocus, onText, onColor, onRemove, onEnter }) {
  const ref = useRef(null);
  const wrapRef = useRef(null);
  const [pick, setPick] = useState(false);
  const fit = useCallback(() => {
    const el = ref.current; if (!el) return;
    el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px';
  }, []);
  useEffect(() => { fit(); }, [value.text, fit]);
  useEffect(() => { if (autoFocus && ref.current) ref.current.focus(); }, [autoFocus]);
  useEffect(() => {
    if (!pick) return;
    const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setPick(false); };
    document.addEventListener('pointerdown', onDoc);
    return () => document.removeEventListener('pointerdown', onDoc);
  }, [pick]);

  return (
    <div className="entry">
      <div className="entry-color" ref={wrapRef}>
        <button className="entry-color-btn" title="Litur á texta"
          onClick={() => setPick((p) => !p)}>
          <span className="dot" style={{ background: value.color }} />
        </button>
        {pick && (
          <div className="color-pop">
            {TEXT_COLORS.map((c) => (
              <button key={c.value} title={c.name}
                className={'sw' + (c.value === value.color ? ' sel' : '')}
                style={{ background: c.value }}
                onClick={() => { onColor(c.value); setPick(false); }} />
            ))}
          </div>
        )}
      </div>
      <textarea
        ref={ref}
        rows={1}
        value={value.text}
        placeholder="Skrifaðu hér…"
        style={{ color: value.color }}
        onChange={(e) => { onText(e.target.value); fit(); }}
        onKeyDown={(e) => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onEnter && onEnter(); }
          if (e.key === 'Backspace' && value.text === '') { e.preventDefault(); onRemove(); }
        }}
        onBlur={() => { if (value.text.trim() === '') onRemove(); }}
      />
      <button className="entry-del" title="Eyða" onClick={onRemove}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
          <path d="M5 5l14 14M19 5L5 19" />
        </svg>
      </button>
    </div>
  );
}

/* ---------------- day card ---------------- */
function DayCard({ date, isToday, picked, entries, holiday, onAdd, onText, onColor, onRemove, focusKey }) {
  const dow = WEEKDAYS[(date.getDay() + 6) % 7];
  const weekend = date.getDay() === 0 || date.getDay() === 6;
  const dk = keyOf(date);
  const list = entries || [];
  const cls = ['day'];
  if (isToday) cls.push('today');
  if (picked) cls.push('picked');
  if (holiday && holiday.kind === 'public') cls.push('holiday');
  if (weekend) cls.push('weekend');
  if (list.length) cls.push('has-entries');

  return (
    <div className={cls.join(' ')}>
      <div className="day-top">
        <div className="date-badge">
          <span className="dnum">{date.getDate()}</span>
          <span className="dmon">{MONTHS_SHORT[date.getMonth()]}</span>
        </div>
        <div className="day-headtext">
          <div className="dow">
            {dow}
            {isToday && <span className="today-tag">Í dag</span>}
          </div>
          {holiday && (
            <div className={'holiday-name' + (holiday.kind === 'special' ? ' special' : '')}>
              {holiday.name}
            </div>
          )}
        </div>
      </div>

      {list.length > 0 && (
        <div className="entries">
          {list.map((entry, i) => (
            <EntryRow
              key={dk + ':' + i}
              value={entry}
              autoFocus={focusKey === dk + ':' + i}
              onText={(v) => onText(dk, i, v)}
              onColor={(c) => onColor(dk, i, c)}
              onRemove={() => onRemove(dk, i)}
              onEnter={() => onAdd(dk)}
            />
          ))}
        </div>
      )}

      <button className="add-entry" onClick={() => onAdd(dk)}>
        <span className="plus">+</span>
        {list.length ? 'Bæta við' : 'Bæta við færslu'}
      </button>
    </div>
  );
}

/* ---------------- month view ---------------- */
function MonthGrid({ anchor, today, entries, onPick }) {
  const y = anchor.getFullYear(), m = anchor.getMonth();
  const offset = (new Date(y, m, 1).getDay() + 6) % 7;
  const dim = new Date(y, m + 1, 0).getDate();
  const weeks = Math.ceil((offset + dim) / 7);
  const start = addDays(new Date(y, m, 1), -offset);
  const cells = [];
  for (let i = 0; i < weeks * 7; i++) cells.push(addDays(start, i));

  return (
    <div className="month-grid">
      {cells.map((d) => {
        const dk = keyOf(d);
        const out = d.getMonth() !== m;
        const hol = window.icelandicHolidayFor(dk);
        const isToday = sameDay(d, today);
        const has = entries[dk] && entries[dk].some((e) => e.text && e.text.trim());
        const cls = ['mcell'];
        if (out) cls.push('out');
        if (!out && hol && hol.kind === 'public') cls.push('holiday');
        if (isToday) cls.push('today');
        return (
          <button key={dk} className={cls.join(' ')} disabled={out}
            title={hol ? hol.name : ''} onClick={() => !out && onPick(d)}>
            <span className="n">{d.getDate()}</span>
            {!out && has && <span className="ev" />}
          </button>
        );
      })}
    </div>
  );
}

function MonthView({ anchor, today, entries, onPick }) {
  // Render the anchor month plus the following months so the user can simply
  // scroll down to browse ahead.
  const AHEAD = 13;
  const months = [];
  for (let i = 0; i < AHEAD; i++) months.push(addMonths(startOfMonth(anchor), i));

  return (
    <div className="month-wrap">
      <div className="dow-head dow-sticky">{DOW_MINI.map((d) => <span key={d}>{d}</span>)}</div>
      {months.map((mo, i) => (
        <div className="msect" key={keyOf(mo)}>
          {i > 0 && (
            <h2 className="msect-cap">
              {cap(MONTHS[mo.getMonth()])} <span className="yr">{mo.getFullYear()}</span>
            </h2>
          )}
          <MonthGrid anchor={mo} today={today} entries={entries} onPick={onPick} />
        </div>
      ))}
      <p className="month-hint">Veldu dag til að opna vikuna ✿</p>
    </div>
  );
}

/* ---------------- list view ---------------- */
function ListView({ entries, onPick }) {
  const keys = Object.keys(entries)
    .filter((k) => entries[k] && entries[k].some((e) => e.text && e.text.trim()))
    .sort();
  if (!keys.length) {
    return (
      <div className="list-empty">
        <div style={{ fontSize: 30, marginBottom: 12 }}>✿</div>
        Engar færslur ennþá.<br />Skrifaðu eitthvað í vikunni þinni.
      </div>
    );
  }
  return (
    <div className="list-wrap">
      {keys.map((k) => {
        const [y, m, da] = k.split('-').map(Number);
        const d = new Date(y, m - 1, da);
        const hol = window.icelandicHolidayFor(k);
        const items = entries[k].filter((e) => e.text && e.text.trim());
        return (
          <button key={k} className="list-day" onClick={() => onPick(d)}>
            <div className="list-date">
              <span className="list-dow">{DOW_MINI[(d.getDay() + 6) % 7]}</span>
              <span className="list-num">{da}. {MONTHS[m - 1]} {y}</span>
              {hol && <span className="list-hol">{hol.name}</span>}
            </div>
            <div className="list-items">
              {items.map((e, i) => (
                <div key={i} className="list-item">
                  <span className="b" style={{ background: e.color }} />
                  <span style={{ color: e.color }}>{e.text}</span>
                </div>
              ))}
            </div>
          </button>
        );
      })}
    </div>
  );
}

/* ---------------- tweaks defaults ---------------- */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "blush",
  "headingFont": "Comfortaa",
  "florals": true
}/*EDITMODE-END*/;

/* ---------------- app ---------------- */
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const today = new Date();
  const [view, setView] = useState('week');
  const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date()));
  const [monthAnchor, setMonthAnchor] = useState(() => startOfMonth(new Date()));
  const [entries, setEntries] = useState(loadEntries);
  const [focusKey, setFocusKey] = useState(null);
  const [picked, setPicked] = useState(null);

  useEffect(() => { saveEntries(entries); }, [entries]);
  useEffect(() => {
    if (!picked) return;
    const id = setTimeout(() => setPicked(null), 1900);
    return () => clearTimeout(id);
  }, [picked]);

  const pal = PALETTES[t.palette] || PALETTES.blush;
  const rootVars = { ...pal.vars, '--heading-font': FONTS[t.headingFont] || FONTS.Comfortaa };
  useEffect(() => {
    document.documentElement.style.setProperty('--heading-font', FONTS[t.headingFont] || FONTS.Comfortaa);
  }, [t.headingFont]);

  const days = [];
  for (let i = 0; i < 7; i++) days.push(addDays(weekStart, i));
  const mid = addDays(weekStart, 3);

  /* entry operations */
  const addEntry = (dk) => setEntries((prev) => {
    const list = prev[dk] ? [...prev[dk]] : [];
    list.push({ text: '', color: DEFAULT_COLOR });
    setFocusKey(dk + ':' + (list.length - 1));
    return { ...prev, [dk]: list };
  });
  const setText = (dk, i, v) => { setEntries((prev) => {
    const list = [...(prev[dk] || [])]; list[i] = { ...list[i], text: v };
    return { ...prev, [dk]: list };
  }); setFocusKey(null); };
  const setColor = (dk, i, c) => setEntries((prev) => {
    const list = [...(prev[dk] || [])]; list[i] = { ...list[i], color: c };
    return { ...prev, [dk]: list };
  });
  const removeEntry = (dk, i) => setEntries((prev) => {
    const list = [...(prev[dk] || [])]; list.splice(i, 1);
    const next = { ...prev };
    if (list.length) next[dk] = list; else delete next[dk];
    return next;
  });

  /* navigation */
  const go = (dir) => {
    if (view === 'week') setWeekStart((w) => addDays(w, 7 * dir));
    else setMonthAnchor((mo) => addMonths(mo, dir));
  };
  const toMonth = () => { setMonthAnchor(startOfMonth(mid)); setView('month'); };
  const toWeek = () => setView('week');
  const toList = () => setView('list');
  const pickDay = (d) => { setWeekStart(startOfWeek(d)); setPicked(keyOf(d)); setView('week'); };
  const goToday = () => {
    setWeekStart(startOfWeek(new Date()));
    setMonthAnchor(startOfMonth(new Date()));
  };

  const titleMain = view === 'list' ? 'Færslur' : (view === 'week' ? cap(MONTHS[mid.getMonth()]) : cap(MONTHS[monthAnchor.getMonth()]));
  const titleYear = view === 'week' ? mid.getFullYear() : monthAnchor.getFullYear();
  const showYear = view !== 'list';
  const rangeText = `${days[0].getDate()}. ${MONTHS_SHORT[days[0].getMonth()]} – ${days[6].getDate()}. ${MONTHS_SHORT[days[6].getMonth()]}`;
  const isCur = view === 'week' ? sameDay(weekStart, startOfWeek(today)) : sameMonth(monthAnchor, today);

  return (
    <div className="page" style={rootVars}>
      {t.florals && <Florals />}
      <div className="shell">
        <header className="cal-head">
          <p className="kicker"><span>{view === 'week' ? 'Vikudagatal' : view === 'month' ? 'Mánaðardagatal' : 'Yfirlit færslna'}</span></p>
          <div className="month-row">
            <h1 className="month-title" style={{ fontFamily: 'var(--heading-font)' }}>
              {titleMain}{showYear && <span className="yr"> {titleYear}</span>}
            </h1>
            {view !== 'list' && (
              <div className="nav">
                <button className="nav-btn" aria-label="Til baka" onClick={() => go(-1)}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 5l-7 7 7 7" /></svg>
                </button>
                <button className="nav-btn" aria-label="Áfram" onClick={() => go(1)}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M9 5l7 7-7 7" /></svg>
                </button>
              </div>
            )}
          </div>
          <div className="subrow">
            <div className="viewseg">
              <button className={view === 'week' ? 'on' : ''} onClick={toWeek}>Vika</button>
              <button className={view === 'month' ? 'on' : ''} onClick={toMonth}>Mánuður</button>
              <button className={view === 'list' ? 'on' : ''} onClick={toList}>Listi</button>
            </div>
            {view !== 'list' && (
              <button className={'today-btn' + (isCur ? ' is-current' : '')} onClick={goToday}>Í dag</button>
            )}
          </div>
          {view === 'week' && <div className="week-cap">{rangeText}</div>}
        </header>

        {view === 'week' && (
          <div className="days">
            {days.map((d) => (
              <DayCard
                key={keyOf(d)}
                date={d}
                isToday={sameDay(d, today)}
                picked={picked === keyOf(d)}
                entries={entries[keyOf(d)]}
                holiday={window.icelandicHolidayFor(keyOf(d))}
                focusKey={focusKey}
                onAdd={addEntry}
                onText={setText}
                onColor={setColor}
                onRemove={removeEntry}
              />
            ))}
          </div>
        )}
        {view === 'month' && (
          <MonthView anchor={monthAnchor} today={today} entries={entries} onPick={pickDay} />
        )}
        {view === 'list' && (
          <ListView entries={entries} onPick={pickDay} />
        )}

        {view === 'week' && <p className="footer-note">Færslur vistast sjálfkrafa á þessu tæki ♡</p>}
        {view === 'list' && <p className="footer-note">Þú ert frábær og stendur þig vel ♡</p>}
      </div>

      <TweaksPanel>
        <TweakSection label="Litir" />
        <div style={{ display: 'flex', gap: 10, padding: '4px 2px 8px', flexWrap: 'wrap' }}>
          {Object.keys(PALETTES).map((key) => {
            const p = PALETTES[key];
            const active = t.palette === key;
            return (
              <button key={key} onClick={() => setTweak('palette', key)} title={p.label}
                style={{
                  cursor: 'pointer', border: active ? '2px solid #333' : '2px solid transparent',
                  background: '#fff', borderRadius: 12, padding: 5, display: 'flex', flexDirection: 'column',
                  alignItems: 'center', gap: 5, boxShadow: '0 1px 4px rgba(0,0,0,.1)', flex: '1 1 64px',
                }}>
                <span style={{ display: 'flex', borderRadius: 8, overflow: 'hidden' }}>
                  {p.dots.map((c, i) => <span key={i} style={{ width: 18, height: 26, background: c }} />)}
                </span>
                <span style={{ fontSize: 10.5, fontWeight: 600, color: '#444' }}>{p.label}</span>
              </button>
            );
          })}
        </div>
        <TweakSection label="Letur & skraut" />
        <TweakRadio label="Fyrirsögn" value={t.headingFont}
          options={['Comfortaa', 'Quicksand']}
          onChange={(v) => setTweak('headingFont', v)} />
        <TweakToggle label="Blómaskraut" value={t.florals}
          onChange={(v) => setTweak('florals', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
