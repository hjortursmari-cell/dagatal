  return (
    <span className="opt-flag" aria-hidden="true">
      {r.map((c, i) => <i key={i}><b style={{ background: c }} /></i>)}
    </span>
  );
}

function SettingsModal({ settings, onChange, onClose }) {
  const lang = settings.lang;
  const stop = (e) => e.stopPropagation();
  return (
    <div className="set-overlay" onClick={onClose}>
      <div className="set-sheet" onClick={stop} role="dialog" aria-modal="true">
        <div className="set-grab" />
        <div className="set-head">
          <h2 className="set-title">{tr('settings')}</h2>
          <button className="set-close" aria-label={tr('close')} onClick={onClose}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M5 5l14 14M19 5L5 19" /></svg>
          </button>
        </div>

        {/* Theme */}
        <div className="set-sect">
          <p className="set-label">{tr('theme')}</p>
          <div className="theme-grid">
            {Object.keys(PALETTES).map((key) => {
              const p = PALETTES[key];
              const on = settings.theme === key;
              const v = p.vars;
              const strip = [v['--surface'], v['--accent'], v['--accent-deep'], v['--ink']];
              return (
                <button key={key} className={'theme-card' + (on ? ' on' : '')} onClick={() => onChange('theme', key)}>
                  <span className="theme-sw">{strip.map((c, i) => <span key={i} style={{ background: c }} />)}</span>
                  <span className="theme-name">
                    {(p.labels && p.labels[lang]) || p.label}
                    {on && <span className="theme-tick"><Tick /></span>}
                  </span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Language */}
        <div className="set-sect">
          <p className="set-label">{tr('language')}</p>
          <div className="opt-list">
            {window.EdyI18n.langs.map((lg) => {
              const on = settings.lang === lg.id;
              return (
                <button key={lg.id} className={'opt-row' + (on ? ' on' : '')} onClick={() => onChange('lang', lg.id)}>
                  <span className="opt-main"><span className="opt-name">{lg.native}</span></span>
                  <span className="opt-check"><Tick /></span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Country */}
        <div className="set-sect">
          <p className="set-label">{tr('country')}</p>
          <div className="opt-list">
            {window.EdyI18n.countries.map((co) => {
              const on = settings.country === co.id;
              return (
                <button key={co.id} className={'opt-row' + (on ? ' on' : '')} onClick={() => onChange('country', co.id)}>
                  <CountryFlag id={co.id} />
                  <span className="opt-main">
                    <span className="opt-name">{co.label[lang]}</span>
                    {on && <span className="opt-sub">{tr('countryNote')}</span>}
                  </span>
                  <span className="opt-check"><Tick /></span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Entries */}
        <div className="set-sect">
          <p className="set-label">{tr('entriesLabel')}</p>
          <div className="set-toggle-row" style={{ borderTop: 'none', borderBottom: 'none' }}>
            <span className="set-toggle-txt">
              {tr('useTime')}
              <span style={{ display: 'block', fontWeight: 500, fontSize: '12.5px', color: 'var(--soft)', marginTop: '3px' }}>{tr('useTimeNote')}</span>
            </span>
            <button className="set-switch" data-on={settings.showTime ? '1' : '0'}
              aria-pressed={!!settings.showTime}
              onClick={() => onChange('showTime', !settings.showTime)}><i /></button>
          </div>
        </div>

        {/* Appearance extras */}
        <div className="set-sect">
          <p className="set-label">{tr('appearance')}</p>
          <span className="set-toggle-txt" style={{ display: 'block', marginBottom: 10 }}>{tr('decoration')}</span>
          <div className="deco-grid">
            {DECO_OPTS.map((o) => {
              const on = (settings.decoration || 'flowers') === o.id;
              return (
                <button key={o.id} className={'deco-card' + (on ? ' on' : '')}
                  onClick={() => onChange('decoration', o.id)}>
                  <span className="deco-ico"><DecoGlyph kind={o.id} /></span>
                  <span className="deco-name">{tr(o.label)}</span>
                  {on && <span className="deco-tick"><Tick /></span>}
                </button>
              );
            })}
          </div>
          <div style={{ paddingTop: 18 }}>
            <span className="set-toggle-txt" style={{ display: 'block', marginBottom: 11 }}>{tr('headingFont')}</span>
            <div className="font-grid">
              {FONT_LIST.map((f) => {
                const on = settings.headingFont === f;
                return (
                  <button key={f} className={'font-card' + (on ? ' on' : '')}
                    onClick={() => onChange('headingFont', f)}>
                    <span className="fc-big" style={{ fontFamily: FONTS[f] }}>Edy</span>
                    <span className="fc-name">{f}</span>
                    {on && <span className="deco-tick"><Tick /></span>}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* keep the EDITMODE block so the Tweaks toolbar still has values to read */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "blush",
  "headingFont": "Comfortaa",
  "decoration": "flowers"
}/*EDITMODE-END*/;

/* ---------------- app ---------------- */
function App() {
  const [settings, setSettings] = useState(loadSettings);
  const updateSetting = (k, v) => setSettings((prev) => ({ ...prev, [k]: v }));
  const [showSettings, setShowSettings] = useState(false);
  // Apply the chosen language for THIS render — render is synchronous top-down,
  // so child components below read the freshly-set locale arrays.
  applyLang(settings.lang);
  const today = new Date();
  const [view, setView] = useState('week');
  const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date()));
  const [monthAnchor, setMonthAnchor] = useState(() => startOfMonth(new Date()));
  const [entries, setEntries] = useState(loadEntries);
  const [events, setEvents] = useState(loadEvents);
  const [tags, setTags] = useState(loadTags);
  const [diary, setDiary] = useState(loadDiary);
  const [focusKey, setFocusKey] = useState(null);
  const [picked, setPicked] = useState(null);

  useEffect(() => { saveEntries(entries); }, [entries]);
  useEffect(() => { saveEvents(events); }, [events]);
  useEffect(() => { saveTags(tags); }, [tags]);
  useEffect(() => { saveDiary(diary); }, [diary]);
  useEffect(() => { saveSettings(settings); }, [settings]);
  useEffect(() => {
    if (!picked) return;
    const id = setTimeout(() => setPicked(null), 1900);
    return () => clearTimeout(id);
  }, [picked]);

  const pal = PALETTES[settings.theme] || PALETTES.blush;
  const rootVars = { ...pal.vars, '--heading-font': FONTS[settings.headingFont] || FONTS.Comfortaa };
  useEffect(() => {
    document.documentElement.style.setProperty('--heading-font', FONTS[settings.headingFont] || FONTS.Comfortaa);
  }, [settings.headingFont]);
  // keep the sticky header measured so the month weekday-row parks just below it,
  // and drop a soft shadow once the page is scrolled
  const headRef = useRef(null);
  useEffect(() => {
    const el = headRef.current; if (!el) return;
    const setH = () => document.documentElement.style.setProperty('--head-h', el.offsetHeight + 'px');
    setH();
    let ro = null;
    if (typeof ResizeObserver !== 'undefined') { ro = new ResizeObserver(setH); ro.observe(el); }
    else window.addEventListener('resize', setH);
    const onScroll = () => { el.classList.toggle('stuck', window.scrollY > 6); };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => {
      if (ro) ro.disconnect(); else window.removeEventListener('resize', setH);
      window.removeEventListener('scroll', onScroll);
    };
  }, []);
  // holidays follow the selected country, named in the selected language
  const holidayFor = (dk) => window.EdyHolidays.lookup(settings.country, settings.lang, dk);
  // recurring events grouped by month-day, so week & month views can show them too
  const eventsByMD = {};
  events.forEach((e) => { const mk = e.month + '-' + e.day; (eventsByMD[mk] = eventsByMD[mk] || []).push(e); });
  const eventsOnDate = (d) => eventsByMD[d.getMonth() + '-' + d.getDate()] || [];

  const days = [];
  for (let i = 0; i < 7; i++) days.push(addDays(weekStart, i));
  const mid = addDays(weekStart, 3);

  /* entry operations */
  const addEntry = (dk) => setEntries((prev) => {
    const list = prev[dk] ? [...prev[dk]] : [];
    const id = newEntryId();
    list.push({ id, text: '', color: DEFAULT_COLOR, time: null });
    setFocusKey(id);
    return { ...prev, [dk]: list };
  });
  const setText = (dk, i, v) => { setEntries((prev) => {
    const list = [...(prev[dk] || [])]; list[i] = { ...list[i], text: v };
    return { ...prev, [dk]: list };
  }); setFocusKey(null); };
  const setColor = (dk, i, c) => setEntries((prev) => {
    const list = [...(prev[dk] || [])]; list[i] = { ...list[i], color: c };
    return { ...prev, [dk]: list };
  });
  const setTime = (dk, i, v) => setEntries((prev) => {
    const list = [...(prev[dk] || [])]; list[i] = { ...list[i], time: v };
    return { ...prev, [dk]: list };
  });
  const reorderEntry = (dk, from, to) => setEntries((prev) => {
    const list = [...(prev[dk] || [])];
    if (from === to || from < 0 || to < 0 || from >= list.length) return prev;
    const [m] = list.splice(from, 1);
    list.splice(Math.min(to, list.length), 0, m);
    return { ...prev, [dk]: list };
  });
  const removeEntry = (dk, i) => setEntries((prev) => {
    const list = [...(prev[dk] || [])]; list.splice(i, 1);
    const next = { ...prev };
    if (list.length) next[dk] = list; else delete next[dk];
    return next;
  });

  /* navigation */
  const go = (dir) => {
    if (view === 'week') setWeekStart((w) => addDays(w, 7 * dir));
    else setMonthAnchor((mo) => addMonths(mo, dir));
  };
  const toMonth = () => { setMonthAnchor(startOfMonth(mid)); setView('month'); };
  const toWeek = () => setView('week');
  const toList = () => setView('list');
  const toEvents = () => setView('events');
  const toDiary = () => setView('diary');
  const setDiaryText = (dk, text) => setDiary((prev) => {
    const next = { ...prev };
    if (text && text.trim()) next[dk] = text; else delete next[dk];
    return next;
  });
  const addEvent = (ev) => setEvents((prev) => [...prev, ev]);
  const updateEvent = (id, data) => setEvents((prev) => prev.map((e) => e.id === id ? { ...e, ...data } : e));
  const removeEvent = (id) => setEvents((prev) => prev.filter((e) => e.id !== id));
  const addTag = (label) => {
    const id = 'tag_' + Date.now();
    const color = TAG_COLORS[tags.filter((t) => !DEFAULT_TAGS.some((d) => d.id === t.id)).length % TAG_COLORS.length];
    const tg = { id, label, color };
    setTags((prev) => [...prev, tg]);
    return tg;
  };
  const removeTag = (id) => setTags((prev) => prev.filter((t) => t.id !== id));
  const setTagColor = (id, color) => setTags((prev) => prev.map((t) => t.id === id ? { ...t, color } : t));
  const pickDay = (d) => { setWeekStart(startOfWeek(d)); setPicked(keyOf(d)); setView('week'); };
  const goToday = () => {
    setWeekStart(startOfWeek(new Date()));
    setMonthAnchor(startOfMonth(new Date()));
  };

  const KICKERS = { week: tr('weekKicker'), month: tr('monthKicker'), list: tr('listKicker'), events: tr('eventsKicker'), diary: tr('diaryKicker') };
  const titleMain = view === 'list' ? tr('listTitle') : view === 'events' ? tr('eventsTitle')
    : view === 'diary' ? tr('diaryTitle')
    : (view === 'week' ? cap(MONTHS[mid.getMonth()]) : cap(MONTHS[monthAnchor.getMonth()]));
  const titleYear = view === 'week' ? mid.getFullYear() : monthAnchor.getFullYear();
  const showYear = view === 'week' || view === 'month';
  const hasNav = view === 'week' || view === 'month';
  const rangeText = `${days[0].getDate()}. ${MONTHS_SHORT[days[0].getMonth()]} – ${days[6].getDate()}. ${MONTHS_SHORT[days[6].getMonth()]}`;
  const isCur = view === 'week' ? sameDay(weekStart, startOfWeek(today)) : sameMonth(monthAnchor, today);

  return (
    <div className="page" style={rootVars}>
      <button className="gear-btn" aria-label={tr('settingsAria')} onClick={() => setShowSettings(true)}>
        <GearIcon />
      </button>
      <Decoration kind={settings.decoration} />
      <div className="shell">
        <header className="cal-head" ref={headRef}>
          <p className="kicker"><span>{KICKERS[view]}</span></p>
          <div className="month-row">
            <h1 className="month-title" style={{ fontFamily: 'var(--heading-font)' }}>
              {titleMain}{showYear && <span className="yr"> {titleYear}</span>}
            </h1>
            {hasNav && (
              <div className="nav">
                <button className="nav-btn" aria-label={tr('back')} onClick={() => go(-1)}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 5l-7 7 7 7" /></svg>
                </button>
                <button className="nav-btn" aria-label={tr('forward')} onClick={() => go(1)}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M9 5l7 7-7 7" /></svg>
                </button>
              </div>
            )}
          </div>
          <div className="subrow">
            <div className="viewseg">
              <button className={view === 'week' ? 'on' : ''} onClick={toWeek}>{tr('segWeek')}</button>
              <button className={view === 'month' ? 'on' : ''} onClick={toMonth}>{tr('segMonth')}</button>
              <button className={view === 'list' ? 'on' : ''} onClick={toList}>{tr('segList')}</button>
              <button className={view === 'events' ? 'on' : ''} onClick={toEvents}>{tr('segEvents')}</button>
              <button className={view === 'diary' ? 'on' : ''} onClick={toDiary}>{tr('segDiary')}</button>
            </div>
            {hasNav && (
              <button className={'today-btn' + (isCur ? ' is-current' : '')} onClick={goToday}>{tr('today')}</button>
            )}
          </div>
          {view === 'week' && <div className="week-cap">{rangeText}</div>}
        </header>

        {view === 'week' && (
          <div className="days">
            {days.map((d) => (
              <DayCard
                key={keyOf(d)}
                date={d}
                isToday={sameDay(d, today)}
                picked={picked === keyOf(d)}
                entries={entries[keyOf(d)]}
                dayEvents={eventsOnDate(d)}
                tags={tags}
                holiday={holidayFor(keyOf(d))}
                showTime={settings.showTime}
                focusKey={focusKey}
                onAdd={addEntry}
                onText={setText}
                onColor={setColor}
                onTime={setTime}
                onRemove={removeEntry}
                onReorder={reorderEntry}
              />
            ))}
          </div>
        )}
        {view === 'month' && (
          <MonthView anchor={monthAnchor} today={today} entries={entries} events={events} onPick={pickDay} holidayFor={holidayFor} />
        )}
        {view === 'list' && (
          <ListView entries={entries} events={events} tags={tags} today={today} onPick={pickDay} holidayFor={holidayFor} />
        )}
        {view === 'events' && (
          <EventsView events={events} tags={tags} today={today}
            onAdd={addEvent} onUpdate={updateEvent} onRemove={removeEvent}
            onAddTag={addTag} onRemoveTag={removeTag} onTagColor={setTagColor} />
        )}
        {view === 'diary' && (
          <DiaryView diary={diary} today={today} holidayFor={holidayFor} onText={setDiaryText} />
        )}

        {view === 'week' && <p className="footer-note">{tr('footerWeek')}</p>}
        {view === 'list' && <p className="footer-note">{tr('footerList')}</p>}
        {view === 'events' && <p className="footer-note">{tr('footerEvents')}</p>}
        {view === 'diary' && <p className="footer-note">{tr('footerDiary')}</p>}
      </div>

      {showSettings && (
        <SettingsModal settings={settings} onChange={updateSetting} onClose={() => setShowSettings(false)} />
      )}

      <TweaksPanel>
        <TweakSection label="Þema" />
        <div style={{ display: 'flex', gap: 10, padding: '4px 2px 8px', flexWrap: 'wrap' }}>
          {Object.keys(PALETTES).map((key) => {
            const p = PALETTES[key];
            const active = settings.theme === key;
            return (
              <button key={key} onClick={() => updateSetting('theme', key)} title={p.label}
                style={{
                  cursor: 'pointer', border: active ? '2px solid #333' : '2px solid transparent',
                  background: '#fff', borderRadius: 12, padding: 5, display: 'flex', flexDirection: 'column',
                  alignItems: 'center', gap: 5, boxShadow: '0 1px 4px rgba(0,0,0,.1)', flex: '1 1 60px',
                }}>
                <span style={{ display: 'flex', borderRadius: 8, overflow: 'hidden' }}>
                  {p.dots.map((c, i) => <span key={i} style={{ width: 16, height: 24, background: c }} />)}
                </span>
                <span style={{ fontSize: 10, fontWeight: 600, color: '#444' }}>{p.label}</span>
              </button>
            );
          })}
        </div>
        <TweakSection label="Tungumál & land" />
        <TweakRadio label="Tungumál" value={settings.lang}
          options={window.EdyI18n.langs.map((l) => ({ value: l.id, label: l.id.toUpperCase() }))}
          onChange={(v) => updateSetting('lang', v)} />
        <TweakSelect label="Land" value={settings.country}
          options={window.EdyI18n.countries.map((c) => ({ value: c.id, label: c.label.en }))}
          onChange={(v) => updateSetting('country', v)} />
        <TweakSection label="Letur & skraut" />
        <TweakSelect label={tr('font')} value={settings.headingFont}
          options={FONT_LIST}
          onChange={(v) => updateSetting('headingFont', v)} />
        <TweakSelect label={tr('decoration')} value={settings.decoration || 'flowers'}
          options={DECO_OPTS.map((o) => ({ value: o.id, label: tr(o.label) }))}
          onChange={(v) => updateSetting('decoration', v)} />
        <TweakSection label={tr('entriesLabel')} />
        <TweakToggle label={tr('useTime')} value={!!settings.showTime}
          onChange={(v) => updateSetting('showTime', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
